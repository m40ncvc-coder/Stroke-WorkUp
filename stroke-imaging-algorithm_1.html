              {!showDawn&&<div style={{marginBottom:"12px",padding:"7px 10px",borderRadius:"var(--rs)",background:"rgba(34,197,94,.07)",border:"1px solid rgba(34,197,94,.25)",fontSize:"12px",color:"var(--green-lt)"}}>
                ✅ 発症4.5h以内：DAWN/DEFUSE 3基準不要。IVT適応は発症時刻で判断済み
              </div>}
              <PerfusionPanel
                detailMode={mriPerfDetailMode} setDetailMode={setMriPerfDetailMode}
                coreVol={mriCoreVol} setCoreVol={setMriCoreVol}
                tmaxVol={mriTmaxVol} setTmaxVol={setMriTmaxVol}
                largeCoreEst={mriLargeCore} setLargeCoreEst={setMriLargeCore}
                mismatch={mriMismatch} setMismatch={setMriMismatch}
                nihss={nihss} age={age} aspectsScore={aspectsScore} showDawn={showDawn}
              />
              <button className="btn btn-p" style={{marginTop:"16px"}} onClick={()=>{
                if (mriPerfDetailMode&&cV>0) { setMriLargeCore(cV>=70); }
                if (mriPerfDetailMode&&mmRatio!==null) { setMriMismatch(mmRatio>=1.2&&(mmVol||0)>=15); }
                addHistory("mri_perfusion","灌流評価（MRI）",
                  mriPerfDetailMode&&cV>0
                    ? `Core ${mriCoreVol}mL${tV>0?` / Tmax>6s ${mriTmaxVol}mL / ratio${mmRatio?.toFixed(2)||"?"}`:""}（詳細入力）`
                    : `Large core: ${mriLargeCore===true?"あり":mriLargeCore===false?"なし":"未評価"}`+
                      (showDawn?` / Mismatch: ${mriMismatch===true?"あり":mriMismatch===false?"なし":"未評価"}`:" / 4.5h以内省略"));
                pushNav(); setTimeout(()=>window.scrollTo({top:0,behavior:"smooth"}),50);
                setImgSubStep("mri_result");
              }}>治療方針を表示 →</button>
            </div>
          );
        })()}


        {/* MRI-6: 治療方針（MRI評価後） */}
        {imgChoice&&imgSubStep==="mri_result"&&(()=>{
          const isPosteriorMri = mriOccluded.some(v=>["VA","BA","P1","P2"].includes(v));
          const aspectsScore = isPosteriorMri ? 10-pcAspectsTapped.length : 10-mriAspectsTapped.length;
          const mriCoreV = parseFloat(mriCoreVol)||0;
          const mriTmaxV = parseFloat(mriTmaxVol)||0;
          const mriMmRatio = mriCoreV>0&&mriTmaxV>mriCoreV ? mriTmaxV/mriCoreV : null;
          const mriMmVol   = mriCoreV>0&&mriTmaxV>mriCoreV ? mriTmaxV-mriCoreV : null;
          const effMriLargeCore = mriPerfDetailMode&&mriCoreV>0 ? mriCoreV>=70 : mriLargeCore;
          const effMriMismatch  = mriPerfDetailMode&&mriMmRatio!==null ? (mriMmRatio>=1.2&&(mriMmVol||0)>=15) : mriMismatch;
          const tx = getCtTreatment({onset, nihss, aspectsScore, vessels:mriOccluded, largeCoreEst:effMriLargeCore, mismatch:effMriMismatch, discoveryH, imgModality:"mri"});
          const onsetH = onset==="lkw_early"?4:onset==="lkw_mid"?12:999;
          const aspectsLabel = isPosteriorMri ? "pc-ASPECTS" : "DWI-ASPECTS";
          return(
            <div className="res-card">
              <div className="res-hdr">
                <div className="res-icon" style={{background:tx.evtOk?"linear-gradient(135deg,#0f766e,#0369a1)":"linear-gradient(135deg,#374151,#1d4ed8)"}}>
                  {tx.evtOk?"⚡":"💊"}
                </div>
                <div>
                  <div className="res-ttl" style={{color:tx.evtOk?"var(--teal-lt)":"var(--blue-lt)"}}>治療方針（MRI評価結果）</div>
                  <div className="res-sub">{mriOccluded.join(" + ")||"閉塞なし"} / {aspectsLabel} {aspectsScore}点</div>
                </div>
              </div>
              <div className="res-body">
                <div className="sec">
                  <div className="sec-ttl">評価サマリー</div>
                  <div className="tx-grid">
                    <div className="tx-item"><div className="tx-name">{aspectsLabel}</div><div className="tx-val" style={{color:aspectsScore>=8?"var(--green-lt)":aspectsScore>=6?"var(--amber-lt)":"var(--red-lt)"}}>{aspectsScore}点</div></div>
                    <div className="tx-item"><div className="tx-name">T2*出血性変化</div><div className="tx-val" style={{color:mriT2starHemorrhage?"var(--amber-lt)":"var(--green-lt)"}}>{mriT2starHemorrhage?"あり":"なし"}</div></div>
                    <div className="tx-item"><div className="tx-name">閉塞血管（MRA）</div><div className="tx-val dflt">{mriOccluded.join(" + ")||"なし"}</div></div>
                    <div className="tx-item"><div className="tx-name">Large core</div><div className="tx-val" style={{color:mriLargeCore===true?"var(--red-lt)":mriLargeCore===false?"var(--green-lt)":"var(--txt3)"}}>{mriLargeCore===true?"あり":mriLargeCore===false?"なし":"未評価"}</div></div>
                    {onsetH>4.5&&<div className="tx-item"><div className="tx-name">灌流Mismatch</div><div className="tx-val" style={{color:mriMismatch===true?"var(--teal-lt)":mriMismatch===false?"var(--red-lt)":"var(--txt3)"}}>{mriMismatch===true?"あり":mriMismatch===false?"なし":"未評価"}</div></div>}
                    <div className="tx-item"><div className="tx-name">NIHSS</div><div className="tx-val" style={{color:ni.c}}>{nihss}点</div></div>
                  </div>
                </div>
                <div className="sec">
                {/* 試験適格性警告（年齢・病前mRS）MRI */}
                {(()=>{
                  const eligWarnings = getTrialEligibilityWarnings(age, premrs, mriOccluded, effMriLargeCore, nihss, onset);
                  if(!eligWarnings.length) return null;
                  return(
                    <div className="sec">
                      <div className="sec-ttl">⚠ 試験適格基準への注意</div>
                      <div style={{display:"flex",flexDirection:"column",gap:"7px"}}>
                        {eligWarnings.map((w,i)=>(
                          <div key={i} className={`alert ${w.type}`}>
                            <span className="ai">{w.type==="danger"?"🚨":w.type==="warn"?"⚠️":"💡"}</span>
                            <span>{w.text}</span>
                          </div>
                        ))}
                      </div>
                    </div>
                  );
                })()}
                  <div className="sec-ttl">推奨治療方針</div>
                  <div style={{display:"flex",flexDirection:"column",gap:"8px"}}>
                  {/* ABC²Dスコア */}
                  {abc2dAvailable&&(
                    <div className="sec">
                      <div className="sec-ttl">ABC²Dスコア（ICAS-O予測）</div>
                      <Abc2dPanel score={abc2dScore} available={abc2dAvailable} icasHigh={icasHigh} ivtOk={tx.ivtOk||tx.ivtNeedsMri}
                        items={[
                          {label:"A: AF なし（既往・来院時とも）（+3）", pts:abc2d_A},
                          {label:"B: 高血圧既往（+1）",       pts:abc2d_B},
                          {label:"C²: NIHSS<7（+1）",        pts:abc2d_C2},
                          {label:"C: CTHSなし（+1）",         pts:abc2d_CTHS},
                          {label:"D: 糖尿病（+1）",           pts:abc2d_D},
                        ]}
                      />
                    </div>
                  )}
                    {tx.skipDawnNote&&<div className="alert ok"><span className="ai">✅</span><span>{tx.skipDawnNote}</span></div>}
                    <div className="alert" style={{background:tx.ivtNeedsMri?"rgba(59,130,246,.08)":tx.ivtOk?(tx.ivtCaution?"rgba(245,158,11,.08)":"rgba(34,197,94,.08)"):"rgba(239,68,68,.08)",border:`1px solid ${tx.ivtNeedsMri?"rgba(59,130,246,.3)":tx.ivtOk?(tx.ivtCaution?"rgba(245,158,11,.3)":"rgba(34,197,94,.3)"):"rgba(239,68,68,.3)"}`,color:tx.ivtNeedsMri?"var(--blue-lt)":tx.ivtOk?(tx.ivtCaution?"var(--amber-lt)":"var(--green-lt)"):"var(--red-lt)"}}>
                      <span className="ai">{tx.ivtNeedsMri?"🔄":tx.ivtOk?(tx.ivtCaution?"⚠️":"💉"):"✗"}</span>
                      <span><strong>IVT（rt-PA/TNK）：</strong>{tx.ivtMsg}</span>
                    </div>
                    <div className="alert" style={{background:tx.evtOk?"rgba(13,148,136,.08)":"rgba(239,68,68,.08)",border:`1px solid ${tx.evtOk?"rgba(13,148,136,.3)":"rgba(239,68,68,.3)"}`,color:tx.evtOk?"var(--teal-lt)":"var(--red-lt)"}}>
                      <span className="ai">{tx.evtOk?"⚡":"✗"}</span>
                      <span><strong>EVT（血管内治療）：</strong>{tx.evtOk?`${tx.evtClass}推奨（${tx.evtReason}）`:"現時点で適応外"}</span>
                    </div>
                    {tx.largeCorNote&&<div className="alert warn"><span className="ai">📐</span><span>{tx.largeCorNote}</span></div>}
                    {tx.mevoNote&&<div className="alert warn"><span className="ai">⚠</span><span>{tx.mevoNote}</span></div>}
                    {tx.isPosterior&&<div className="alert info"><span className="ai">🧠</span><span>後方循環LVO：NIHSS≥10・24h以内ならEVT Class I（ATTENTION・BAOCHE試験）</span></div>}
                    {!tx.ivtOk&&!tx.evtOk&&<div className="alert info"><span className="ai">💊</span><span>内科管理・二次予防：DAPT（非心原性）または抗凝固療法（AF）。病型診断後に速やかに開始</span></div>}
                  </div>
                </div>
                {mriOccluded.some(v=>["ICA-I","ICA-T","M1p","M1d"].includes(v))&&onset==="lkw_late"&&(
                  <div className="sec">
                    <div className="sec-ttl">当院参加臨床試験</div>
                    <div className="trial-box">
                      <div className="trial-hd"><span className="trial-badge">RCT 招募中</span><span className="trial-name">SKIP-EXTEND試験</span></div>
                      <div className="trial-grid">
                        <div className="tr-row"><span className="tr-k">登録番号</span><span className="tr-v">jRCT1032230344</span></div>
                        <div className="tr-row"><span className="tr-k">対象</span><span className="tr-v">LKW 24h超・NIHSS≥6・ASPECTS≥5・側副血行良好</span></div>
                      </div>
                      <span className="trial-status">● 招募中</span>
                    </div>
                  </div>
                )}
                <div className="btn-row">
                  <SaveToSheetButton caseNo={caseNo} payload={{
                    nihss, aspects: isPosteriorMri?10-pcAspectsTapped.length:10-mriAspectsTapped.length,
                    occludedVessel: mriOccluded.join('/') || 'なし',
                    largeCoreEst: effMriLargeCore===true?'あり':effMriLargeCore===false?'なし':'未評価',
                    mismatch: effMriMismatch===true?'あり':effMriMismatch===false?'なし':'未評価',
                    ivt: tx.ivtMsg, evt: tx.evtOk?`${tx.evtClass}（${tx.evtReason}）`:'適応外',
                    abc2dScore, icasHigh: icasHigh?'ICAS-O高疑い':'',
                    sbpR, dbpR, jcs,
                    pupilR, pupilL,
                    // LVOスケール6項目（病院評価）— Hotlineの救急現場評価とは別列
                    lvo_irregular_hosp: afibAny?'あり':'なし',
                    lvo_gaze_hosp: gaze||'なし',
                    lvo_neglect_hosp: neglect||'なし',
                    lvo_aphasia_hosp: aphasia?'あり':'なし',
                    lvo_facial_hosp: facialPalsy||'なし',
                    lvo_arm_hosp: armParesis||'なし',
                    lvoScaleTotal, lvoScalePos: lvoScalePos?'陽性':'陰性',
                    imgModality: 'MRI',
                  }}/>
                  <button className="btn btn-g" onClick={reset}>最初からやり直す</button>
                </div>
              </div>
            </div>
          );
        })()}

        {/* ══ Wake-up専用フロー（発症不明・MRI 1st choice）══ */}

        {/* Wake-up DWI */}
        {imgChoice&&imgSubStep==="wakeup_dwi"&&(
          <div className="card">
            <div className="slabel">Step / DWI所見（Wake-up）</div>
            <div className="sq">DWI（拡散強調画像）の所見は？</div>
            <div className="shint">急性梗塞はDWIで高信号・ADCで低信号として描出される</div>
            <div className="opts">
              {[["DWI 陽性（拡散制限あり）","急性虚血巣が同定 → FLAIR所見へ",true],["DWI 陰性（明確な病変なし）","TIA・mimic・超急性期・後方循環微小梗塞の可能性",false]].map(([lbl,desc,val])=>(
                <button key={String(val)} className="opt" onClick={()=>handleWakeupDwi(val)}>
                  <span className="opt-k">{val?"A":"B"}</span>
                  <span style={{flex:1}}><span className="opt-t">{lbl}</span><span className="opt-d">{desc}</span></span>
                </button>
              ))}
              <button className="opt" onClick={()=>setImgSubStep("image_result")}>
                <span className="opt-k">C</span>
                <span style={{flex:1}}><span className="opt-t">MRA/CTAで血管閉塞が先に判明</span><span className="opt-d">DWI-FLAIR評価より先に血管閉塞が確定した場合</span></span>
              </button>
            </div>
          </div>
        )}

        {/* Wake-up FLAIR */}
        {imgChoice&&imgSubStep==="wakeup_flair"&&(
          <div className="card">
            <div className="slabel">Step / FLAIR所見（Wake-up）</div>
            <div className="sq">DWI陽性領域に対応するFLAIR高信号はありますか？</div>
            <div className="shint">FLAIR陰性 = 発症4.5h以内相当（WAKE-UP基準）。陽性 = 4.5h超を示唆</div>
            <div className="opts">
              {[["FLAIR 陰性（対応する高信号なし）","✅ DWI-FLAIR Mismatch(+) → 発症4.5h以内相当。IVT適応を検討",false],["FLAIR 陽性（対応する高信号あり）","❌ Mismatch(-) → 発症4.5h超を示唆。IVT適応外の可能性",true]].map(([lbl,desc,val],i)=>(
                <button key={String(val)} className="opt" onClick={()=>handleWakeupFlair(val)}>
                  <span className="opt-k">{String.fromCharCode(65+i)}</span>
                  <span style={{flex:1}}><span className="opt-t">{lbl}</span><span className="opt-d">{desc}</span></span>
                </button>
              ))}
            </div>
          </div>
        )}

        {/* Wake-up vessel (Mismatch+) */}
        {imgChoice&&imgSubStep==="wakeup_vessel_pos"&&(
          <div className="card">
            <div className="slabel">Step / 血管閉塞確認（Mismatch+）</div>
            <div className="sq">MRA（またはCTA）で血管閉塞はありましたか？</div>
            <div className="shint">Mismatch(+)はIVT適応の根拠。LVO合併があればEVTも並行して検討</div>
            <div className="opts">
              {[["LVO（ICA / M1 / 脳底動脈）あり","IVT + EVT の Bridging therapy を検討","LVO(+)","r_wakeup_mm_lvo"],["MeVO（M2〜M3 / A2 / P2等）あり","IVT適応（WAKE-UP基準）。EVTは非推奨","MeVO(+)","r_wakeup_mm_mevo"],["血管閉塞なし","IVT単独適応（WAKE-UP基準）","閉塞なし","r_wakeup_mm_nolvo"]].map(([lbl,desc,tag,res],i)=>(
                <button key={tag} className="opt" onClick={()=>handleWakeupVessel(tag,res)}>
                  <span className="opt-k">{String.fromCharCode(65+i)}</span>
                  <span style={{flex:1}}><span className="opt-t">{lbl}</span><span className="opt-d">{desc}</span></span>
                </button>
              ))}
            </div>
          </div>
        )}

        {/* Wake-up vessel (Mismatch-) */}
        {imgChoice&&imgSubStep==="wakeup_vessel_neg"&&(
          <div className="card">
            <div className="slabel">Step / 血管閉塞確認（Mismatch-）</div>
            <div className="sq">MRA（またはCTA）で血管閉塞はありましたか？</div>
            <div className="shint">FLAIR陽性（Mismatch陰性）でもLVO+灌流mismatchがあればEVT（DAWN/DEFUSE 3）を評価。IVTは原則適応外</div>
            <div className="opts">
              {[["LVO（ICA / M1 / 脳底動脈）あり","灌流mismatch(CTP)でEVT（DAWN/DEFUSE 3）適応を評価","LVO(+)","r_wakeup_nomm_lvo"],["MeVO または 閉塞なし","IVT適応外・内科管理","MeVO/閉塞なし","r_wakeup_nomm_nolvo"]].map(([lbl,desc,tag,res],i)=>(
                <button key={tag} className="opt" onClick={()=>handleWakeupVessel(tag,res)}>
                  <span className="opt-k">{String.fromCharCode(65+i)}</span>
                  <span style={{flex:1}}><span className="opt-t">{lbl}</span><span className="opt-d">{desc}</span></span>
                </button>
              ))}
            </div>
          </div>
        )}
      </>
    )}

    {/* ══════════════════════════════════════════════════════
        PHASE 3: 治療方針（Result card）
    ══════════════════════════════════════════════════════ */}
    {phase===3&&result&&(
      <div className="res-card">
        <div className="res-hdr">
          <div className="res-icon" style={{background:result.iconBg}}>{result.icon}</div>
          <div>
            <div className="res-ttl" style={{color:result.titleColor}}>治療方針</div>
            <div className="res-sub" style={{color:result.titleColor,opacity:.8}}>{result.title}</div>
          </div>
        </div>
        <div className="res-body">

          {/* Score summary */}
          <div className="sec">
            <div className="sec-ttl">入力サマリー</div>
            <div className="tx-grid">
              <div className="tx-item"><div className="tx-name">年齢</div><div className="tx-val dflt">{age}歳{sex?`・${sex==="male"?"男性":"女性"}`:""}</div></div>
              {premrs!==null&&<div className="tx-item"><div className="tx-name">病前mRS</div><div className="tx-val" style={{color:premrs==="unknown"?"var(--blue-lt)":premrs<=1?"var(--green-lt)":premrs<=3?"var(--amber-lt)":"var(--red-lt)"}}>{premrs==="unknown"?"不明":`${premrs}点（${["完全自立","ほぼ自立","軽度障害","中等度障害","中等度〜重度","重度障害"][premrs]}）`}</div></div>}
              <div className="tx-item"><div className="tx-name">NIHSS</div><div className="tx-val" style={{color:ni.c}}>{nihss}点（{ni.l}）</div></div>
              {aspectsOk&&<div className="tx-item"><div className="tx-name">ASPECTS</div><div className="tx-val" style={{color:ai.c}}>{aspects}点（{ai.l}）</div></div>}
              {ichVolOk&&<div className="tx-item"><div className="tx-name">血腫量（推定）</div><div className="tx-val" style={{color:ii.c}}>{ichVol} mL（{ii.l}）</div></div>}
              {mriOk!==null&&<div className="tx-item"><div className="tx-name">MRI禁忌</div><div className="tx-val" style={{color:mriOk?"var(--green-lt)":"var(--amber-lt)"}}>{mriOk?"禁忌なし":"禁忌あり"}</div></div>}
              {imgChoice&&<div className="tx-item"><div className="tx-name">実施画像</div><div className="tx-val" style={{color:imgChoice==="1st"?"var(--green-lt)":"var(--amber-lt)"}}>{imgChoice==="1st"?"✓ 1st choice":"⚠ 2nd choice"}</div></div>}
              {afibVital===true&&<div className="tx-item"><div className="tx-name">心電図</div><div className="tx-val amber">心房細動あり</div></div>}
              {stChange===true&&<div className="tx-item"><div className="tx-name">ST変化</div><div className="tx-val amber">ST変化あり</div></div>}
              {lvoSuspect&&<div className="tx-item" style={{gridColumn:"1/-1"}}><div className="tx-name">頸部エコー EDV比</div><div className="tx-val red">健側/病側 = {edvRatio?.toFixed(2)}（≥1.4）→ LVO疑い</div></div>}
              {acMeds.length>0&&<div className="tx-item" style={{gridColumn:"1/-1"}}><div className="tx-name">抗凝固薬</div><div className="tx-val dflt">{acMeds.map(id=>MEDS_AC.find(m=>m.id===id)?.name).join("・")}{lastAcTime&&`（最終投与：${lastAcTime}）`}</div></div>}
            </div>
          </div>

          {/* Criteria */}
          {criteriaRows.length>0&&(
            <div className="sec">
              <div className="sec-ttl">試験・治療基準 適合判定</div>
              <div className="crit-list">
                {criteriaRows.map((r,i)=>(
                  <div key={i} className={`crit ${r.cls}`}>
                    <span className="crit-lbl">{r.label}</span>
                    <span className={`crit-b b-${r.cls}`}>{r.met?(r.cls==="warn"?"⚠ 要確認":"✓ 該当"):"✗ 非該当"}</span>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* Imaging */}
          <div className="sec">
            <div className="sec-ttl">追加画像・確認事項</div>
            <div className="img-list">
              {result.imaging.map((img,i)=>(
                <div key={i} className={`img-item ${img.type}`}>
                  <span className={`img-lbl lbl-${img.type==="primary"?"p":img.type==="secondary"?"s":"c"}`}>{img.label}</span>
                  <span className="img-txt" dangerouslySetInnerHTML={{__html:img.text}}/>
                </div>
              ))}
            </div>
          </div>

          {/* Treatment */}
          <div className="sec">
            <div className="sec-ttl">治療方針サマリー</div>
            <div className="tx-grid">
              {result.tx.map((t,i)=>(
                <div key={i} className="tx-item">
                  <div className="tx-name">{t.name}</div>
                  <div className={`tx-val ${t.cls||"dflt"}`}>{t.val}</div>
                </div>
              ))}
            </div>
          </div>

          {/* Alerts */}
          {result.alerts?.length>0&&(
            <div className="sec">
              <div className="sec-ttl">注意事項・エビデンス</div>
              <div style={{display:"flex",flexDirection:"column",gap:"7px"}}>
                {result.alerts.map((a,i)=>(
                  <div key={i} className={`alert ${a.type}`}>
                    <span className="ai">{a.icon}</span>
                    <span>{a.text}</span>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* Aorta detail */}
          {result.aortaDetail&&(
            <div className="sec">
              <div className="sec-ttl">大動脈解離スクリーニング記録</div>
              <div style={{display:"flex",flexDirection:"column",gap:"5px"}}>
                {[[`右上肢 BP：${sbpR}/${dbpR} mmHg`,sbpR<110],[`左上肢 BP：${sbpL}/${dbpL} mmHg`,false],[`収縮期差：${sbpDiff} mmHg`,sbpDiff>=20],[`頸部エコー flap（病側）：${necSick_flap===true?"確認（陽性）":necSick_flap===false?"認めず（陰性）":"未施行"}`,necSick_flap===true]].map(([lbl,pos],i)=>(
                  <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 11px",borderRadius:"var(--rs)",background:"var(--surf2)",border:`1px solid ${pos?"rgba(239,68,68,.4)":"var(--bdr)"}`}}>
                    <span style={{fontSize:"12px",color:"var(--txt2)"}}>{lbl}</span>
                    {pos&&<span style={{fontSize:"11px",fontWeight:700,color:"var(--red-lt)"}}>陽性</span>}
                  </div>
                ))}
              </div>
              <div style={{marginTop:"10px",padding:"10px 12px",borderRadius:"var(--rs)",background:"rgba(239,68,68,.06)",border:"1px solid rgba(239,68,68,.2)",fontSize:"12px",color:"var(--red-lt)",lineHeight:"1.6"}}>
                <strong>Stanford分類：</strong><br/>
                <strong style={{color:"#fff"}}>Type A（上行大動脈含む）</strong>：緊急外科手術の絶対適応<br/>
                <strong style={{color:"var(--amber-lt)"}}>Type B（下行大動脈のみ）</strong>：原則内科管理（血圧・心拍数コントロール）。合併症例は血管内治療を検討
              </div>
            </div>
          )}

          {/* ICH detail: ABC bundle + Reversal + Surgery */}
          {result.ichDetail&&(
            <>
              <div className="sec">
                <div className="sec-ttl">ABCバンドル（ABC-ICH / INTERACT3）</div>
                <div className="bundle-grid">
                  <div className="bundle-item">
                    <div className="bl a">A</div><div className="bn">Anticoagulation Reversal</div>
                    <div className="br">抗凝固薬内服中：即時に拮抗薬を投与</div>
                    <div><span className="bt">目標：INR &lt;1.5 / 60分以内</span></div>
                  </div>
                  <div className="bundle-item">
                    <div className="bl b">B</div><div className="bn">Blood Pressure</div>
                    <div className="br">収縮期血圧を速やかに低下・維持</div>
                    <div><span className="bt">目標：SBP &lt;140 mmHg（1h以内・7日間維持）</span></div>
                    <div className="br" style={{fontSize:"11px",marginTop:"4px"}}>ニカルジピン点滴 / ラベタロール / ヒドララジン</div>
                  </div>
                  <div className="bundle-item">
                    <div className="bl c">C</div><div className="bn">Care pathway</div>
                    <div className="br">脳神経外科への緊急コンサルト</div>
                    <div className="br">血糖：<span className="bt">6.1–7.8 mmol/L</span></div>
                    <div className="br">体温：<span className="bt">≤37.5℃</span></div>
                    <div className="br" style={{fontSize:"11px",marginTop:"3px"}}>嚥下評価・早期リハビリ・DVT予防</div>
                  </div>
                </div>
              </div>

              {/* Reversal table – show only selected meds if any, else show all */}
              <div className="sec">
                <div className="sec-ttl">抗凝固薬拮抗プロトコール{acMeds.length>0?"（内服薬に基づく）":""}</div>
                <div style={{overflowX:"auto",borderRadius:"var(--rs)",border:"1px solid var(--bdr)"}}>
                  <table className="rev-table">
                    <thead><tr><th>抗凝固薬</th><th>薬剤名</th><th>拮抗薬</th><th>投与量・目標</th></tr></thead>
                    <tbody>
                      {(acMeds.length>0 ? MEDS_AC.filter(m=>acMeds.includes(m.id)) : MEDS_AC).map(m=>(
                        <tr key={m.id}>
                          <td><span className={`dtag ${m.clsTag}`}>{m.cls}</span></td>
                          <td>{m.name}</td>
                          <td><span className="ra">{m.reversal}</span></td>
                          <td><div className="rd">{m.dose}</div></td>
                        </tr>
                      ))}
                      <tr><td style={{color:"var(--txt3)",fontWeight:400,fontSize:"11px"}} colSpan="4">抗血小板薬内服中：血小板輸血はエビデンス乏しく（PATCH試験で有害傾向）。個別判断。</td></tr>
                    </tbody>
                  </table>
                </div>
              </div>

              <div className="sec">
                <div className="sec-ttl">外科治療の適応（脳卒中治療ガイドライン2021改訂2023）</div>
                <div className="surg-grid">
                  {[["ind","🟡 小脳出血（積極的に検討）",<>神経症状の悪化・脳幹圧迫・水頭症を呈した<strong>直径 ≥3 cm（≒14 cm³）</strong><br/><span style={{fontSize:"11px",color:"var(--txt3)"}}>→ 開頭血腫除去術 or 定位的吸引術（推奨グレードB）</span></>],
                    ["ind","🟡 被殻出血（条件付き検討）",<>中等度神経症状 + <strong>血腫量 ≥31 mL</strong><br/><span style={{fontSize:"11px",color:"var(--txt3)"}}>→ 内視鏡的除去術 or 開頭術（Grade B）。GCS ≤4は原則保存療法</span></>],
                    ["ind","🟡 皮質下出血（条件付き検討）",<>意識低下 + <strong>脳表から1 cm以内</strong><br/><span style={{fontSize:"11px",color:"var(--txt3)"}}>大きな脳葉型出血（≥50 cm³）・若年者・増悪傾向（Grade B）</span></>],
                    ["ind","🟡 脳室穿破・閉塞性水頭症",<><strong>脳室ドレナージ（EVD）</strong>を緊急施行</>],
                    ["no","🔴 手術非推奨",<><strong>視床・脳幹出血</strong>：血腫除去術は勧められない<br/><strong>血腫量 &lt;10 cm³</strong> or <strong>症状軽微</strong>：保存療法<br/><strong>GCS ≤4</strong>：手術効果が期待できない</>]
                  ].map(([cls,loc,crit],i)=>(
                    <div key={i} className={`surg-item ${cls}`}>
                      <div className="surg-loc">{loc}</div>
                      <div className="surg-c">{crit}</div>
                    </div>
                  ))}
                </div>
                <div style={{fontSize:"11px",color:"var(--txt3)",marginTop:"8px",padding:"7px 11px",background:"rgba(255,255,255,.02)",borderRadius:"var(--rs)",border:"1px dashed var(--bdr)"}}>
                  推定血腫量（cm³）＝長径 × 短径 × 高さ × 1/2（ABC/2法）　／　手術の最終判断は脳神経外科医と協議
                </div>
              </div>
            </>
          )}

          {/* Tags */}
          <div className="sec">
            <div className="sec-ttl">関連キーワード</div>
            <div className="tag-row">{result.tags.map((t,i)=><span key={i} className="tag">{t}</span>)}</div>
          </div>

          {/* Trial */}
          {result.trial&&(
            <div className="sec">
              <div className="sec-ttl">当院参加臨床試験</div>
              <div className="trial-box">
                <div className="trial-hd"><span className="trial-badge">RCT 招募中</span><span className="trial-name">{result.trial.name}</span></div>
                <div className="trial-grid">
                  <div className="tr-row"><span className="tr-k">主幹施設</span><span className="tr-v">{result.trial.sponsor}</span></div>
                  <div className="tr-row"><span className="tr-k">登録番号</span><span className="tr-v">{result.trial.jrct||result.trial.nct}</span></div>
                  <div className="tr-row"><span className="tr-k">対象時間窓</span><span className="tr-v">{result.trial.window}</span></div>
                  <div className="tr-row"><span className="tr-k">適格基準</span><span className="tr-v">{result.trial.target}</span></div>
                  <div className="tr-row" style={{gridColumn:"1/-1"}}><span className="tr-k">画像プロトコール</span><span className="tr-v">{result.trial.imaging}</span></div>
                  {result.trial.note&&<div className="tr-row" style={{gridColumn:"1/-1"}}><span className="tr-k">備考</span><span className="tr-v">{result.trial.note}</span></div>}
                </div>
                <span className="trial-status">● {result.trial.status}</span>
              </div>
            </div>
          )}

          <div className="btn-row">
            <button className="btn btn-p" onClick={reset}>最初からやり直す</button>
          </div>
        </div>
      </div>
    )}

    {/* Footer */}
    <div className="footer">
      <div className="footer-ttl">主要エビデンス・ガイドライン</div>
      <div className="footer-refs">
        <span>① Prabhakaran S, et al. 2026 AHA/ASA Guideline for Early Management of AIS. <em>Stroke</em> 2026.</span><br/>
        <span>② Hacke W, et al. WAKE-UP trial. <em>NEJM</em> 2018;378:2551–2562.</span><br/>
        <span>③ Ma H, et al. EXTEND trial. <em>NEJM</em> 2019;380:1795–1803.</span><br/>
        <span>④ Nogueira RG, et al. DAWN trial. <em>NEJM</em> 2018;378:11–21.</span><br/>
        <span>⑤ Albers GW, et al. DEFUSE 3 trial. <em>NEJM</em> 2018;378:708–718.</span><br/>
        <span>⑥ ATTENTION &amp; BAOCHE trials（椎骨脳底動脈EVT）. <em>NEJM</em> 2022.</span><br/>
        <span>⑦ SELECT2・ANGEL-ASPECT trials（Large core EVT）. <em>NEJM</em> 2023.</span><br/>
        <span>⑧ ESCAPE-MeVO・DISTAL・DISCOUNT trials（MeVO EVT）. <em>ISC 2025</em>.</span><br/>
        <span>⑨ Macha K, et al. CT vs MRI for unknown-onset thrombolysis. <em>Neurology</em> 2020;95:e2954.</span><br/>
        <span>⑩ Ma L, et al. INTERACT3 trial. <em>Lancet</em> 2023;402:27–40.</span><br/>
        <span>⑪ Parry-Jones AR, et al. ABC-ICH care bundle. <em>Ann Neurol</em> 2019;86:495–503.</span><br/>
        <span>⑫ 日本脳卒中学会. 脳卒中治療ガイドライン2021（改訂2023）. 脳出血の章.</span><br/>
        <span>⑬ Connolly SJ, et al. Andexanet alfa（ANNEXA-4）. <em>NEJM</em> 2019;380:1326–1335.</span><br/>
        <span>⑭ Broderick JP, et al. FASTEST trial（rFVIIa for ICH）. <em>Lancet</em> 2026.</span><br/>
        <span>⑮ SKIP-EXTEND試験（jRCT1032230344）：24h超LVO. 日本医科大学主導.</span><br/>
        <span>⑯ RESCUE-M2O試験（NCT07347665）：M2閉塞EVT. 兵庫医科大学主導.</span><br/>
        <span>⑰ FASTEST Part 2試験（NCT07227246）：spot sign陽性ICHへのrFVIIa. 継続中.</span>
      </div>
      <div className="disclaimer">⚠️ 本ツールは教育・臨床参照目的です。実際の治療判断は患者個別の状態・施設体制・禁忌事項を総合した担当医の判断に従ってください。</div>
    </div>
  </div>
  </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<StrokeAlgo/>);

  </script>
</body>
</html>
