<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>Stroke Imaging Algorithm</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useCallback } = React;


// ─── Fonts ────────────────────────────────────────────────────────────────────
const FONT = `@import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');`;

// ─── Styles ───────────────────────────────────────────────────────────────────
const CSS = `
${FONT}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0f1a;--surf:#111827;--surf2:#1a2235;--bdr:#253048;
  --teal:#0d9488;--teal-lt:#14b8a6;--amber:#f59e0b;--amber-lt:#fcd34d;
  --red:#ef4444;--red-lt:#fca5a5;--blue:#3b82f6;--blue-lt:#93c5fd;
  --green:#22c55e;--green-lt:#86efac;--purple:#7c3aed;--purple-lt:#c4b5fd;
  --txt:#e2e8f0;--txt2:#94a3b8;--txt3:#64748b;
  --r:12px;--rs:8px;
}
body{background:var(--bg);color:var(--txt);font-family:'IBM Plex Sans',sans-serif;font-size:14px;line-height:1.6}
.app{min-height:100vh;display:flex;flex-direction:column;max-width:900px;margin:0 auto;padding:20px 16px 60px}

/* Header */
.hdr{border-bottom:1px solid var(--bdr);padding-bottom:16px;margin-bottom:22px}
.hdr-top{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap}
.badge{background:linear-gradient(135deg,var(--teal),#0369a1);color:#fff;font-family:'Syne',sans-serif;font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:3px 10px;border-radius:4px}
.badge-gl{font-size:11px;color:var(--amber);background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2);border-radius:4px;padding:2px 8px}
h1{font-family:'Syne',sans-serif;font-size:clamp(18px,4vw,25px);font-weight:800;color:#fff;line-height:1.2;margin-bottom:5px}
.hdr-sub{font-size:13px;color:var(--txt2)}

/* Phase stepper */
.stepper{display:flex;align-items:flex-start;margin-bottom:20px}
.step-node{display:flex;flex-direction:column;align-items:center;gap:3px;flex-shrink:0}
.step-dot{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;border:2px solid var(--bdr);background:var(--surf2);color:var(--txt3);transition:all .3s}
.step-dot.active{border-color:var(--teal);background:rgba(13,148,136,.15);color:var(--teal-lt)}
.step-dot.done{border-color:var(--teal);background:var(--teal);color:#fff}
.step-lbl{font-size:9px;color:var(--txt3);text-align:center;text-transform:uppercase;letter-spacing:.03em;max-width:60px;line-height:1.3}
.step-lbl.active{color:var(--teal-lt)}
.step-line{flex:1;height:2px;background:var(--bdr);margin-top:14px;min-width:6px;transition:background .3s}
.step-line.done{background:var(--teal)}

/* Progress */
.prog{height:3px;background:var(--bdr);border-radius:99px;margin-bottom:18px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--teal),var(--blue));transition:width .4s}

/* Trail */
.trail{margin-bottom:16px}
.trail-hd{font-size:10px;color:var(--txt3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.trail-items{display:flex;flex-direction:column;gap:3px}
.trail-row{display:flex;gap:8px;font-size:12px}
.trail-k{color:var(--txt3);flex-shrink:0;width:160px}
.trail-v{color:var(--teal-lt);font-weight:500}

/* Card */
.card{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r);padding:22px;animation:up .3s ease both}
@keyframes up{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.card+.card,.card+.score-card,.score-card+.card{margin-top:12px}
.slabel{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--teal-lt);margin-bottom:7px}
.sq{font-family:'Syne',sans-serif;font-size:clamp(15px,3vw,18px);font-weight:700;color:#fff;line-height:1.3;margin-bottom:5px}
.shint{font-size:12px;color:var(--txt2);margin-bottom:18px;line-height:1.55}

/* Options */
.opts{display:flex;flex-direction:column;gap:9px}
.opt{background:var(--surf2);border:1px solid var(--bdr);border-radius:var(--rs);padding:11px 15px;display:flex;align-items:flex-start;gap:11px;cursor:pointer;text-align:left;color:inherit;font-family:inherit;font-size:14px;width:100%;transition:border-color .18s,background .18s,transform .12s}
.opt:hover{border-color:var(--teal);background:rgba(13,148,136,.06);transform:translateX(2px)}
.opt-k{min-width:23px;height:23px;border-radius:5px;background:rgba(255,255,255,.06);border:1px solid var(--bdr);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--txt3);flex-shrink:0;margin-top:1px}
.opt-t{font-weight:600;color:var(--txt);display:block}
.opt-d{font-size:12px;color:var(--txt2);margin-top:2px;line-height:1.4;display:block}

/* Score slider */
.score-card{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r);padding:22px;animation:up .3s ease both}
.sc-hd{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:5px}
.sc-name{font-size:13px;font-weight:600;color:var(--txt)}
.sc-range{font-size:11px;color:var(--txt3)}
.sc-row{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.sc-big{font-family:'Syne',sans-serif;font-size:44px;font-weight:800;line-height:1;min-width:58px;text-align:center;transition:color .2s}
.sc-wrap{flex:1}
input[type=range]{-webkit-appearance:none;width:100%;height:6px;border-radius:3px;outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid #fff;transition:transform .1s}
input[type=range]::-webkit-slider-thumb:hover{transform:scale(1.15)}
.sc-chips{display:flex;gap:5px;flex-wrap:wrap;margin-top:5px}
.chip{font-size:11px;font-weight:600;padding:2px 8px;border-radius:99px;border:1px solid;white-space:nowrap;transition:opacity .2s}
.chip.on{opacity:1}
.chip.off{opacity:.3}
.crit-list{margin-top:10px;display:flex;flex-direction:column;gap:5px}
.crit{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;border-radius:var(--rs);background:var(--surf2);border:1px solid var(--bdr);font-size:12px;transition:border-color .2s,background .2s}
.crit.met{border-color:rgba(34,197,94,.4);background:rgba(34,197,94,.05)}
.crit.warn{border-color:rgba(245,158,11,.4);background:rgba(245,158,11,.04)}
.crit.unmet{border-color:rgba(239,68,68,.25);background:rgba(239,68,68,.03)}
.crit-lbl{color:var(--txt2)}
.crit-b{font-size:11px;font-weight:700;padding:2px 7px;border-radius:4px}
.b-met{background:rgba(34,197,94,.15);color:var(--green-lt)}
.b-warn{background:rgba(245,158,11,.15);color:var(--amber-lt)}
.b-unmet{background:rgba(239,68,68,.12);color:var(--red-lt)}

/* Imaging rec card */
.irec{background:linear-gradient(135deg,rgba(13,148,136,.08),rgba(59,130,246,.05));border:1px solid rgba(13,148,136,.3);border-radius:var(--r);padding:18px 20px;animation:up .3s ease both}
.irec-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:var(--teal-lt);margin-bottom:12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.irec-badge{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;background:var(--teal);color:#fff;padding:2px 7px;border-radius:3px}
.irec-rat{font-size:12px;color:var(--txt3);margin-bottom:10px;font-style:italic;line-height:1.5}
.choice-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px}
.isteps{display:flex;flex-direction:column;gap:7px;margin-bottom:10px}
.istep{display:flex;align-items:flex-start;gap:9px;background:var(--surf);border-radius:var(--rs);padding:9px 11px;border-left:3px solid var(--teal-lt)}
.istep.alt{border-left-color:var(--amber)}
.istep-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;border-radius:3px;padding:1px 6px;flex-shrink:0;margin-top:1px}
.lbl-1{background:rgba(13,148,136,.2);color:var(--teal-lt)}
.lbl-2{background:rgba(245,158,11,.15);color:var(--amber-lt)}
.istep-txt{font-size:13px;color:var(--txt);line-height:1.5}
.istep-txt strong{color:#fff}
.irec-note{font-size:12px;color:var(--txt2);border-top:1px solid rgba(255,255,255,.06);padding-top:9px;line-height:1.55}

/* Aorta screening */
.bp-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.bp-in{background:var(--surf2);border:1px solid var(--bdr);border-radius:var(--rs);padding:7px 10px;color:var(--txt);font-family:'IBM Plex Sans',sans-serif;font-size:16px;font-weight:700;width:82px;text-align:center;outline:none;-moz-appearance:textfield;transition:border-color .2s}
.bp-in::-webkit-inner-spin-button,.bp-in::-webkit-outer-spin-button{-webkit-appearance:none}
.bp-in:focus{border-color:var(--teal)}
.bp-unit{font-size:12px;color:var(--txt3)}
.ao-banner{border-radius:var(--rs);padding:11px 14px;display:flex;align-items:center;gap:10px;font-size:13px;font-weight:600;margin-bottom:14px}
.ao-pos{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.35);color:var(--red-lt)}
.ao-neg{background:rgba(34,197,94,.07);border:1px solid rgba(34,197,94,.3);color:var(--green-lt)}
.toggle-row{display:flex;gap:8px}
.toggle-btn{flex:1;padding:9px 12px;border-radius:var(--rs);cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;transition:all .18s}

/* Result */
.res-card{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden;animation:up .35s ease both}
.res-hdr{padding:18px 22px 16px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:13px}
.res-icon{width:46px;height:46px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:21px;flex-shrink:0}
.res-ttl{font-family:'Syne',sans-serif;font-size:17px;font-weight:800}
.res-sub{font-size:12px;color:var(--txt2);margin-top:3px}
.res-body{padding:18px 22px}
.sec{margin-bottom:18px}
.sec:last-child{margin-bottom:0}
.sec-ttl{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--txt3);margin-bottom:9px;display:flex;align-items:center;gap:8px}
.sec-ttl::after{content:'';flex:1;height:1px;background:var(--bdr)}

.img-list{display:flex;flex-direction:column;gap:7px}
.img-item{display:flex;align-items:flex-start;gap:9px;background:var(--surf2);border-radius:var(--rs);padding:9px 12px;border-left:3px solid transparent}
.img-item.primary{border-color:var(--teal-lt)}
.img-item.secondary{border-color:var(--bdr)}
.img-item.conditional{border-color:var(--amber)}
.img-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;border-radius:3px;padding:1px 5px;flex-shrink:0;margin-top:2px}
.lbl-p{background:rgba(13,148,136,.18);color:var(--teal-lt)}
.lbl-s{background:rgba(255,255,255,.06);color:var(--txt3)}
.lbl-c{background:rgba(245,158,11,.15);color:var(--amber-lt)}
.img-txt{font-size:13px;color:var(--txt);line-height:1.5}
.img-txt strong{color:#fff}

.tx-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
@media(max-width:480px){.tx-grid{grid-template-columns:1fr}}
.tx-item{background:var(--surf2);border:1px solid var(--bdr);border-radius:var(--rs);padding:9px 11px}
.tx-name{font-size:10px;color:var(--txt3);margin-bottom:2px;text-transform:uppercase;letter-spacing:.05em}
.tx-val{font-size:13px;font-weight:600}
.green{color:var(--green-lt)}.amber{color:var(--amber-lt)}.red{color:var(--red-lt)}.blue{color:var(--blue-lt)}.dflt{color:var(--txt)}

.alert{border-radius:var(--rs);padding:11px 13px;font-size:13px;line-height:1.55;display:flex;gap:9px;align-items:flex-start}
.alert.warn{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.22);color:var(--amber-lt)}
.alert.danger{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.22);color:var(--red-lt)}
.alert.info{background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.22);color:var(--blue-lt)}
.alert.ok{background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.22);color:var(--green-lt)}
.ai{font-size:15px;flex-shrink:0;margin-top:1px}

.tag-row{display:flex;flex-wrap:wrap;gap:5px}
.tag{font-size:11px;padding:3px 8px;border-radius:99px;background:rgba(255,255,255,.05);border:1px solid var(--bdr);color:var(--txt2)}

/* Trial box */
.trial-box{border-radius:var(--rs);padding:13px 15px;background:linear-gradient(135deg,rgba(245,158,11,.06),rgba(59,130,246,.06));border:1px solid rgba(245,158,11,.35)}
.trial-hd{display:flex;align-items:center;gap:8px;margin-bottom:9px;flex-wrap:wrap}
.trial-badge{font-size:10px;font-weight:700;text-transform:uppercase;background:linear-gradient(90deg,var(--amber),#f97316);color:#000;padding:2px 7px;border-radius:3px;letter-spacing:.07em}
.trial-name{font-size:13px;font-weight:700;color:var(--amber-lt)}
.trial-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px}
@media(max-width:460px){.trial-grid{grid-template-columns:1fr}}
.tr-row{font-size:11px;line-height:1.5}
.tr-k{color:var(--txt3);display:block}
.tr-v{color:var(--txt2);font-weight:500}
.trial-status{display:inline-block;margin-top:7px;font-size:11px;font-weight:600;color:var(--green-lt);background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);border-radius:4px;padding:2px 7px}

/* ICH/ABC bundle */
.bundle-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px}
@media(max-width:540px){.bundle-grid{grid-template-columns:1fr}}
.bundle-item{border-radius:var(--rs);padding:12px 13px;border:1px solid var(--bdr);background:var(--surf2)}
.bl{font-family:'Syne',sans-serif;font-size:27px;font-weight:800;line-height:1;margin-bottom:3px}
.bl.a{color:#f87171}.bl.b{color:#fb923c}.bl.c{color:#facc15}
.bn{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--txt2);margin-bottom:7px}
.br{font-size:12px;color:var(--txt2);line-height:1.45;margin-bottom:2px}
.bt{display:inline-block;font-size:11px;font-weight:700;color:#fff;background:rgba(255,255,255,.08);border-radius:3px;padding:1px 6px;margin-top:2px}

/* Reversal table */
.rev-table{width:100%;border-collapse:collapse;font-size:12px}
.rev-table th{background:rgba(255,255,255,.04);color:var(--txt3);font-weight:600;text-align:left;padding:6px 9px;border-bottom:1px solid var(--bdr);font-size:10px;text-transform:uppercase;letter-spacing:.05em}
.rev-table td{padding:7px 9px;border-bottom:1px solid rgba(255,255,255,.04);color:var(--txt2);vertical-align:top;line-height:1.45}
.rev-table tr:last-child td{border-bottom:none}
.rev-table td:first-child{color:var(--txt);font-weight:600}
.dtag{display:inline-block;font-size:10px;font-weight:600;padding:1px 5px;border-radius:3px;margin:1px 2px 1px 0}
.dtag.xa{background:rgba(59,130,246,.15);color:var(--blue-lt);border:1px solid rgba(59,130,246,.25)}
.dtag.thr{background:rgba(167,139,250,.15);color:var(--purple-lt);border:1px solid rgba(167,139,250,.25)}
.dtag.vka{background:rgba(245,158,11,.15);color:var(--amber-lt);border:1px solid rgba(245,158,11,.25)}
.dtag.hep{background:rgba(34,197,94,.12);color:var(--green-lt);border:1px solid rgba(34,197,94,.2)}
.ra{font-weight:700;color:#fff}
.rd{font-size:11px;color:var(--txt3);margin-top:2px;line-height:1.5}

/* Surgery */
.surg-grid{display:flex;flex-direction:column;gap:6px}
.surg-item{border-radius:var(--rs);padding:10px 12px;background:var(--surf2);border-left:3px solid var(--bdr)}
.surg-item.ind{border-left-color:var(--amber)}
.surg-item.no{border-left-color:var(--red)}
.surg-loc{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--txt3);margin-bottom:3px}
.surg-c{font-size:12px;color:var(--txt2);line-height:1.55}
.surg-c strong{color:var(--txt)}

/* Buttons */
.btn-row{display:flex;gap:9px;margin-top:18px;flex-wrap:wrap}
.btn{font-family:'IBM Plex Sans',sans-serif;font-size:13px;font-weight:600;padding:10px 18px;border-radius:var(--rs);cursor:pointer;border:none;transition:opacity .15s,transform .12s}
.btn:hover{opacity:.85;transform:translateY(-1px)}
.btn-p{background:var(--teal);color:#fff}
.btn-g{background:transparent;border:1px solid var(--bdr);color:var(--txt2)}
.btn-warn{background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.4);color:var(--amber-lt)}

/* Meds input */
.med-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
@media(max-width:480px){.med-grid{grid-template-columns:1fr}}
.med-item{background:var(--surf2);border:1px solid var(--bdr);border-radius:var(--rs);padding:10px 12px;cursor:pointer;transition:all .18s}
.med-item.sel{border-color:var(--teal);background:rgba(13,148,136,.08)}
.med-item:hover{border-color:var(--teal-lt)}
.med-name{font-size:13px;font-weight:600;color:var(--txt)}
.med-class{font-size:11px;color:var(--txt3);margin-top:1px}

/* Footer */
.footer{margin-top:26px;padding:15px 18px;background:var(--surf);border:1px solid var(--bdr);border-radius:var(--rs)}
.footer-ttl{font-size:10px;color:var(--txt3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:7px}
.footer-refs{font-size:11px;color:var(--txt3);line-height:1.8}
.footer-refs span{color:var(--txt2)}
.disclaimer{margin-top:12px;font-size:11px;color:var(--txt3);line-height:1.5;padding:9px 12px;border:1px dashed var(--bdr);border-radius:var(--rs)}
`;

// ─── Phase definitions ─────────────────────────────────────────────────────────
const PHASES = ["来院前", "救急外来", "画像診断", "治療方針"];

// ─── Score helpers ─────────────────────────────────────────────────────────────
const nihssInfo = n => n===0?{l:"スコア0",c:"var(--green-lt)"}:n<=3?{l:"軽症",c:"var(--green-lt)"}:n<=5?{l:"軽〜中等症",c:"var(--teal-lt)"}:n<=10?{l:"中等症",c:"var(--amber-lt)"}:n<=20?{l:"重症",c:"#fb923c"}:{l:"最重症",c:"var(--red-lt)"};
const nihssSev = n => n>=6?"重症(NIHSS≥6)":n>=4?"中等症(NIHSS 4–5)":"軽症(NIHSS≤3)";
const aspectsInfo = a => a>=8?{l:"良好(≥8)",c:"var(--green-lt)"}:a>=6?{l:"中等度(6–7)",c:"var(--amber-lt)"}:{l:"Large core(≤5)",c:"var(--red-lt)"};
const ichVolInfo = v => v<10?{l:"小(<10mL)",c:"var(--green-lt)"}:v<=30?{l:"中(10–30mL)",c:"var(--amber-lt)"}:v<=60?{l:"大(30–60mL)",c:"#fb923c"}:{l:"超大(>60mL)",c:"var(--red-lt)"};

// ─── BP Drum Roll ──────────────────────────────────────────────────────────────
function NumberPicker({value, onChange, min=0, max=120, step=1, width=100}){
  const timerRef = { current: null };
  const speedRef = { current: 1 };

  const startPress = (dir) => {
    onChange(v => Math.min(max, Math.max(min, v + dir * step)));
    let count = 0;
    timerRef.current = setInterval(() => {
      count++;
      if (count > 10) speedRef.current = 5;
      if (count > 20) speedRef.current = 10;
      onChange(v => Math.min(max, Math.max(min, v + dir * speedRef.current * step)));
    }, 120);
  };
  const stopPress = () => {
    clearInterval(timerRef.current);
    speedRef.current = 1;
  };

  const handleWheel = (e) => {
    e.preventDefault();
    onChange(v => Math.min(max, Math.max(min, v + (e.deltaY < 0 ? step : -step))));
  };

  const btnStyle = {
    width: "44px", height: "44px", background: "var(--surf2)",
    border: "1px solid var(--bdr)", cursor: "pointer",
    display: "flex", alignItems: "center", justifyContent: "center",
    fontSize: "20px", color: "var(--txt2)", userSelect: "none",
    WebkitUserSelect: "none", touchAction: "manipulation",
  };
  return (
    <div style={{display:"flex",alignItems:"center",gap:"0",borderRadius:"var(--rs)",overflow:"hidden",border:"1px solid var(--bdr)"}}>
      <button style={{...btnStyle,borderRadius:"var(--rs) 0 0 var(--rs)",borderRight:"none"}}
        onMouseDown={()=>startPress(-1)} onMouseUp={stopPress} onMouseLeave={stopPress}
        onTouchStart={(e)=>{e.preventDefault();startPress(-1);}} onTouchEnd={stopPress}>−</button>
      <div onWheel={handleWheel}
        style={{width:`${width}px`,height:"44px",background:"var(--surf2)",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Syne',sans-serif",fontSize:"24px",fontWeight:800,color:"var(--txt)",cursor:"ns-resize",userSelect:"none"}}>
        {value}
      </div>
      <button style={{...btnStyle,borderRadius:"0 var(--rs) var(--rs) 0",borderLeft:"none"}}
        onMouseDown={()=>startPress(1)} onMouseUp={stopPress} onMouseLeave={stopPress}
        onTouchStart={(e)=>{e.preventDefault();startPress(1);}} onTouchEnd={stopPress}>＋</button>
    </div>
  );
}

function Drum({value, onChange, min=0, max=250, step=5, width=80}){
  const handleWheel = (e) => {
    e.preventDefault();
    const d = e.deltaY < 0 ? step : -step;
    onChange(Math.min(max, Math.max(min, Math.round((value+d)/step)*step)));
  };
  return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",width:`${width}px`}}>
      <button onClick={()=>onChange(Math.min(max,Math.round((value+step)/step)*step))}
        style={{width:"100%",height:"26px",background:"none",border:"none",color:"var(--txt3)",fontSize:"14px",cursor:"pointer"}}>▲</button>
      <div onWheel={handleWheel}
        style={{width:"100%",height:"44px",background:"var(--surf2)",border:"1px solid var(--bdr)",borderRadius:"var(--rs)",display:"flex",alignItems:"center",justifyContent:"center",cursor:"ns-resize",userSelect:"none"}}>
        <span style={{fontFamily:"'Syne',sans-serif",fontSize:"20px",fontWeight:800,color:"var(--txt)"}}>{value}</span>
      </div>
      <button onClick={()=>onChange(Math.max(min,Math.round((value-step)/step)*step))}
        style={{width:"100%",height:"26px",background:"none",border:"none",color:"var(--txt3)",fontSize:"14px",cursor:"pointer"}}>▼</button>
    </div>
  );
}

// ─── ScoreSlider component ─────────────────────────────────────────────────────
function ScoreSlider({label,value,min,max,onChange,color,chips,crits}){
  const pct=((value-min)/(max-min))*100;
  return(
    <div style={{marginBottom:"4px"}}>
      <div className="sc-hd"><span className="sc-name">{label}</span><span className="sc-range">{min}–{max}</span></div>
      <div className="sc-row">
        <div className="sc-big" style={{color}}>{value}</div>
        <div className="sc-wrap">
          <input type="range" min={min} max={max} value={value} onChange={e=>onChange(+e.target.value)}
            style={{background:`linear-gradient(to right,${color} ${pct}%,var(--bdr) ${pct}%)`}}/>
          <div className="sc-chips">
            {chips.map(([l,c,on])=><span key={l} className={`chip ${on?"on":"off"}`} style={{borderColor:c,color:on?c:"var(--txt3)"}}>{l}</span>)}
          </div>
        </div>
      </div>
      {crits&&<div className="crit-list">{crits.map((r,i)=>(
        <div key={i} className={`crit ${r.cls}`}>
          <span className="crit-lbl">{r.label}</span>
          <span className={`crit-b b-${r.cls}`}>{r.met?(r.cls==="warn"?"⚠ 要確認":"✓ 該当"):"✗ 非該当"}</span>
        </div>
      ))}</div>}
    </div>
  );
}

// ─── Imaging recommendation logic ─────────────────────────────────────────────
function getImagingRec(onset, sev, mriOk, discoveryH, herniationSign){
  const hi=sev==="高",mid=sev==="中",ok=mriOk;
  const wakeupIvtPossible = onset==="lkw_mid" && discoveryH==="unknown_within4.5";
  const wakeupLvoSuspect  = hi;
  const ctProto = {steps:[{type:"first",label:"1st",text:"<strong>NCCT</strong>（非造影CT）― 出血除外・ASPECTS評価"},{type:"first",label:"1st",text:"<strong>CTA（頭頸部）</strong>― LVO/MeVO確認・側副血行評価・<strong>CTP自動付随</strong>"}]};

  // 脳ヘルニア徴候あり → CT-first強制
  if (herniationSign) return {
    title:"CT（脳ヘルニア徴候あり）― 頭部CT最優先",
    rationale:"脳ヘルニア徴候（JCS≥200 / JCS≥30+瞳孔不同 / JCS≥30+両側散瞳≥5mm）を認める。MRIは禁忌。頭部CTを緊急施行して出血・脳浮腫・ヘルニアを評価する",
    steps:[{type:"first",label:"1st",text:"<strong>NCCT（頭部）</strong>― 出血・脳浮腫・ミッドラインシフト・テント切痕ヘルニアを確認"}],
    alt:[{type:"alt",label:"追加",text:"<strong>CTA（頭頸部）</strong>― 出血除外後、LVOの有無を確認（状態が許す場合）"}],
    note:"脳ヘルニア徴候あり：MRI禁忌。脳神経外科への緊急コンサルトを検討",
    herniation:true,
  };

  if(onset==="lkw_early"){
    if(hi||mid)return{
      title:"CT + CTA（CTP自動付随）",
      rationale:"速度最優先。MRIによる遅延は避ける。目標：来院→画像 ≤20分",
      steps:ctProto.steps,
      alt:ok?[{type:"alt",label:"2nd",text:"<strong>MRI DWI + T2* + FLAIR + MRA</strong>― CT困難・後方循環強疑いの場合。DTN遅延リスクあり"}]:null,
      note:"目標 DTN ≤60分 / D2P ≤90分",
    };
    return{title:"NCCT（→ 後方循環疑いはMRI）",rationale:"軽症。出血除外最優先",
      steps:[{type:"first",label:"1st",text:"<strong>NCCT</strong>― 出血除外"}],
      alt:ok?[{type:"alt",label:"2nd/追加",text:"<strong>MRI DWI + T2* + FLAIR + MRA</strong>― 後方循環症状・NCCT陰性で症状説明できない場合"}]:[{type:"alt",label:"2nd",text:"<strong>CTA</strong>― 後方循環疑い時"}],
      note:"NIHSS ≤3でも内包・脳幹梗塞はdisablingになりうる"};
  }
  if(onset==="lkw_mid"&&discoveryH==="clear")return{
    title:"CT + CTA（CTP自動付随）",
    rationale:"延長ウィンドウはCTPによる灌流mismatch評価が必須",
    steps:[{type:"first",label:"1st",text:"<strong>NCCT + CTA（頭頸部）</strong>― 出血除外・LVO/MeVO確認・ASPECTS・CTP自動付随"},{type:"first",label:"1st",text:"<strong>CTP</strong>― コア体積・灌流mismatch（DAWN：コア<51mL / DEFUSE 3：コア<70mL・ratio≥1.8）"}],
    alt:ok?[{type:"alt",label:"2nd",text:"<strong>MRI DWI + T2* + FLAIR + MRA</strong>― DWI-FLAIR mismatchでIVT、MRAでLVO確認。灌流評価はCTPで補完"}]:null,
    note:"4.5–9h・コア<70mL・mismatch>10mLならIVTも検討（EXTEND Class 2a）"};
  if(onset==="lkw_mid"&&discoveryH&&discoveryH!=="clear"){
    // 発見から4.5h超 → IVT適応なし。EVT目的でCT優先
    if(discoveryH==="unknown_beyond4.5")return{
      title:"CT + CTA（CTP自動付随）― 発見4.5h超・IVT適応なし",
      rationale:"発見から4.5h超のためIVT適応なし。LVO/MeVOのEVT適応評価（DAWN/DEFUSE 3）のみ。CTAPで閉塞確認・灌流評価を行う",
      steps:[{type:"first",label:"1st",text:"<strong>NCCT + CTA（CTP自動付随）</strong>― 出血除外・閉塞確認・CTPでDAWN/DEFUSE 3基準評価（コア<51mL or <70mL・mismatch≥1.8）"}],
      alt:null,
      note:"IVTの適応なし。EVTのみ検討（DAWN：NIHSS≥10・コア<51mL / DEFUSE 3：コア<70mL・ratio≥1.8）"};
    // 発見から4.5h以内 + LVO高疑い → CT優先
    if(wakeupIvtPossible&&wakeupLvoSuspect)return{
      title:"CT + CTA（CTP自動付随）― LVO高疑い・CT優先",
      rationale:"発見4.5h以内・LVO高疑い（NIHSS≥6）。MRIよりCTが時間的に優位。CTAでLVO確認後EVT。MeVO/末梢閉塞・閉塞なしの場合はMRIへ移行してDWI-FLAIR mismatch評価",
      steps:[{type:"first",label:"1st",text:"<strong>NCCT + CTA（CTP自動付随）</strong>― LVO確認優先。IVTはDWI-FLAIR mismatch確認後に追加判断"}],
      alt:ok?[{type:"alt",label:"CTAでMeVO/末梢・閉塞なし→",text:"<strong>MRI DWI + T2* + FLAIR + MRA</strong>へ移行 ― DWI-FLAIR mismatch評価でIVT適応を確認"}]:null,
      note:"LVO確認→EVT（+ FLAIR確認後IVT）。MeVO/末梢・閉塞なし→MRIでDWI-FLAIR mismatch確認→IVT適応判断"};
    // 発見から4.5h以内 + LVO疑いなし（軽症・中等症）→ MRI優先
    if(wakeupIvtPossible&&!wakeupLvoSuspect)return{
      title:ok?"MRI DWI + T2* + FLAIR + MRA":"CT + CTA（CTP自動付随）",
      rationale:ok
        ?"発見4.5h以内・LVO疑いなし。DWI-FLAIR mismatch評価でIVT適応を判断（WAKE-UP試験）。MRIの方がIVT適応判断に有用"
        :"MRI禁忌のためCTPでIVT適応評価（EXTEND基準）",
      steps:ok?[{type:"first",label:"1st",text:"<strong>MRI DWI + T2* + FLAIR</strong>― DWI-FLAIR mismatch評価（WAKE-UP基準）"},{type:"first",label:"1st",text:"<strong>MRA（頭蓋内）</strong>― LVO/MeVO確認"}]:[{type:"first",label:"1st",text:"<strong>NCCT + CTA（CTP自動付随）</strong>― CTP mismatch（コア<70mL・ratio≥1.2）でIVT適応評価（EXTEND基準）"}],
      alt:ok?[{type:"alt",label:"2nd（MRI困難時）",text:"<strong>NCCT + CTA（CTP自動付随）</strong>― CTPでmismatch評価（EXTEND基準）"}]:null,
      note:ok?"WAKE-UP試験（NEJM 2018）：DWI(+)/FLAIR(-) mismatchでrt-PA → mRS 0–1有意増加（OR 1.61）":"MRI禁忌でもCTP mismatchによるIVT適応評価は可能"};
    // discoveryH未入力 → 一般的な推奨
    return{
      title:ok?"CT or MRI（発見経過時間を確認）":"CT + CTA（CTP自動付随）",
      rationale:"発見からの経過時間を確認して画像プロトコールを決定してください（フェーズ1で入力）",
      steps:[{type:"first",label:"1st",text:"<strong>来院前情報で発見からの経過時間を選択してください</strong>"}],
      alt:null,note:"発見から4.5h以内か否かで画像・治療方針が大きく変わります"};
  }
  // 24h超
  return{title:"CT + CTA（CTP自動付随）",rationale:"24h超は標準再灌流療法の適応外。SKIP-EXTEND試験対象を確認",
    steps:[{type:"first",label:"1st",text:"<strong>NCCT + CTA（CTP自動付随）</strong>― LVO残存確認・側副血行評価・完成梗塞の範囲"}],
    alt:ok?[{type:"alt",label:"追加",text:"<strong>MRI DWI + T2* + FLAIR</strong>― 虚血巣確定・出血性変換評価（亜急性期以降）"}]:null,
    note:"症状増悪・fluctuationがある場合は必ずCTAで残存LVOを再確認"};
}

  {id:"A1",   label:"A1",  full:"前大脳動脈A1"},
  {id:"A2",   label:"A2",  full:"前大脳動脈A2"},
  {id:"VA",   label:"VA",  full:"椎骨動脈"},
  {id:"BA",   label:"BA",  full:"脳底動脈"},
  {id:"P1",   label:"P1",  full:"後大脳動脈P1"},
  {id:"P2",   label:"P2",  full:"後大脳動脈P2"},
];

// ─── CT treatment decision ────────────────────────────────────────────────────
function getCtTreatment({onset, nihss, aspectsScore, vessels, largeCoreEst, mismatch, discoveryH, imgModality}){
  const onsetH = onset==="lkw_early"?4:onset==="lkw_mid"?12:999;
  // Wake-up: 発見4.5h以内かどうか
  const wakeupIvtWindow = onset==="lkw_mid" && discoveryH==="unknown_within4.5";
  // CT単独施行の場合、発症不明例でDWI-FLAIR mismatch未確認 → IVT適応なし
  const ctOnly = imgModality==="ct";
  const isPosterior = vessels.some(v=>["VA","BA","P1","P2"].includes(v));
  const isLVO = vessels.some(v=>["ICA-I","ICA-T","M1p","M1d"].includes(v));
  const isMeVO = vessels.some(v=>["M2","M3","A1","A2"].includes(v));
  const largeCore = largeCoreEst===true || aspectsScore<=5;

  // IVT適応
  // 発症不明（wakeupIvtWindow）+ CT単独 → DWI-FLAIR mismatch未確認のためIVT適応なし
  const ivtOk = onsetH <= 4.5 || (wakeupIvtWindow && !ctOnly);
  const ivtNeedsMri = wakeupIvtWindow && ctOnly; // MRI追加でIVT検討可能
  const ivtCaution = ivtOk && (largeCore || aspectsScore <= 4);
  const ivtMsg = ivtNeedsMri
    ? "IVT適応なし（CT単独：DWI-FLAIR mismatch未確認）― IVTを検討する場合はMRIを追加してDWI-FLAIR mismatchを確認"
    : !ivtOk
      ? (onset==="lkw_mid" ? "IVT適応なし（発見から4.5h超）" : "適応外（発症4.5h超）")
      : ivtCaution
        ? `慎重投与 / IVT skip考慮（${aspectsScore<=4?`ASPECTS ${aspectsScore}点`:""} ${largeCore?"Large core":""}）― 広範な早期脳虚血性変化。IVT skipも選択肢`
        : onsetH<=4.5
          ? "適応あり → 即時投与（DTN ≤60分）"
          : "適応あり（発見4.5h以内・DWI-FLAIR mismatch確認済み） → 即時投与（DTN ≤60分）";

  // EVT適応
  // EVT適応：発症不明は発見時刻で時間窓を判断
  // 発見4.5h以内 → 実質的に発症から9h以内相当として扱う（DEFUSE 3準用）
  const effectiveOnsetH = wakeupIvtWindow ? 8 : onsetH; // 発見4.5h以内は中間値8hとして評価

  let evtOk = false, evtClass = "", evtReason = "";
  if (effectiveOnsetH <= 9 && (isLVO || isPosterior)) {
    evtOk = true; evtClass = "Class I"; evtReason = "0–9h LVO";
  } else if (effectiveOnsetH <= 24 && (isLVO || isPosterior) && mismatch) {
    evtOk = true; evtClass = "Class I"; evtReason = "DAWN/DEFUSE 3 基準（灌流mismatch確認）";
  } else if (onsetH === 99 && !wakeupIvtWindow && (isLVO || isPosterior) && mismatch) {
    // 発見4.5h超の発症不明：灌流mismatch必須
    evtOk = true; evtClass = "Class I"; evtReason = "発症不明・発見4.5h超・灌流mismatch確認";
  } else if (onsetH > 24 && isLVO) {
    evtOk = true; evtClass = "Class 2a"; evtReason = "SKIP-EXTEND試験対象確認";
  }

  // Large core でも EVT
  let largeCorNote = "";
  if (largeCore && evtOk) largeCorNote = "Large core（ASPECTS≤5）でもEVT検討可（SELECT2/ANGEL-ASPECT）";

  // MeVO
  let mevoNote = "";
  if (isMeVO && !isLVO) {
    evtOk = false;
    mevoNote = "MeVO：IVT優先・EVT現時点では非推奨（ESCAPE-MeVO 2025）";
  }

  // Dawn/Defuse3 不要な時間窓
  const skipDawnNote = onsetH <= 4.5 ? "発症4.5h以内：DAWN/DEFUSE 3基準の確認不要" : "";

  return {ivtOk, ivtCaution, ivtNeedsMri, ivtMsg, evtOk, evtClass, evtReason, largeCore, largeCorNote, mevoNote, skipDawnNote, isPosterior, isLVO, isMeVO};
}

// ─── Trial eligibility warnings ───────────────────────────────────────────────
function getTrialEligibilityWarnings(age, premrs, vessels, largeCoreEst, nihss, onset) {
  const warnings = [];
  const premrsNum = (premrs==="unknown"||premrs===null) ? null : Number(premrs);
  const isLVO      = vessels.some(v=>["ICA-I","ICA-T","M1p","M1d"].includes(v));
  const isPosterior= vessels.some(v=>["VA","BA","P1","P2"].includes(v));
  const isLargeCore= largeCoreEst===true;
  const onsetH     = onset==="lkw_early"?4:onset==="lkw_mid"?12:999;

  // 年齢
  if (age > 90) {
    warnings.push({type:"warn",
      text:`年齢 ${age}歳：主要EVT試験（DAWN・DEFUSE 3・SELECT2等）は18–90歳が対象。90歳超への適用はエビデンスの外挿となる。個別のリスク・ベネフィット評価が必要`});
  }

  // 病前mRS
  if (premrsNum !== null && premrsNum >= 3) {
    warnings.push({type:"danger",
      text:`病前mRS ${premrsNum}点（${["完全自立","ほぼ自立","軽度障害","中等度障害","中等度〜重度障害","重度障害"][premrsNum]}）：DAWN・DEFUSE 3・SELECT2・ANGEL-ASPECT等の主要RCTは病前mRS 0–2を対象。mRS≥3では治療による機能回復の期待値が根本的に異なる。再開通治療の適応は慎重に個別判断すること`});
  }
  if (premrsNum===2 && nihss>=10 && onsetH>9) {
    warnings.push({type:"info",
      text:`病前mRS 2点：DAWN試験は病前mRS 0–1が対象のため厳密には適格外。DEFUSE 3（0–2）・SELECT2（0–2）は対象内`});
  }

  // Large core + 病前mRS
  if (isLargeCore && premrsNum!==null && premrsNum>=3) {
    warnings.push({type:"danger",
      text:`Large core EVT（SELECT2・ANGEL-ASPECT試験）は病前mRS 0–2が対象。病前mRS≥3ではエビデンスなし`});
  }

  // 後方循環 + 病前mRS
  if (isPosterior && premrsNum!==null && premrsNum>=2) {
    warnings.push({type:"warn",
      text:`後方循環LVO：ATTENTION・BAOCHE試験は病前mRS 0–1が主な対象（一部mRS≤2を含む）。病前mRS≥2の場合は試験の適格外となる可能性があり、脳幹機能の回復余地を踏まえた慎重な個別判断が必要`});
  }

  return warnings;
}

// ─── GAS連携（Hotlineと同一スプレッドシート）───────────────────────────────
const GAS_URL = "https://script.google.com/macros/s/AKfycbwNE9IzKJ6_xQLZhGAI1eetEnVZ3wUORoB2c-qQUznjmjoaZu156HZMJDi8EbrIesVU6g";

async function saveAlgorithmData(payload) {
  try {
    await fetch(GAS_URL, {
      method: 'POST', mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action: 'update', ...payload }),
    });
    return true;
  } catch(e) { return false; }
}

function SaveToSheetButton({ caseNo, payload }) {
  const [status, setStatus] = useState(null);
  const save = async () => {
    if (!caseNo) { setStatus('no_case'); setTimeout(()=>setStatus(null),3000); return; }
    setStatus('saving');
    const ok = await saveAlgorithmData({ caseNo, ...payload });
    setStatus(ok ? 'ok' : 'error');
    setTimeout(()=>setStatus(null), 4000);
  };
  return(
    <div style={{display:"flex",flexDirection:"column",gap:"5px",flex:1}}>
      <button className="btn" onClick={save} disabled={status==='saving'}
        style={{background:status==='ok'?"rgba(34,197,94,.12)":status==='error'?"rgba(239,68,68,.12)":"rgba(56,189,248,.08)",border:`1px solid ${status==='ok'?"rgba(34,197,94,.4)":status==='error'?"rgba(239,68,68,.4)":"rgba(56,189,248,.35)"}`,color:status==='ok'?"var(--green-lt)":status==='error'?"var(--red-lt)":"var(--blue-lt)",fontWeight:700}}>
        {status==='saving'?"保存中...":status==='ok'?"✓ シートに保存しました":status==='error'?"⚠ 保存失敗":status==='no_case'?"症例番号が必要です":"📊 シートに保存"}
      </button>
      <div style={{fontSize:"11px",color:caseNo?"var(--txt3)":"var(--amber-lt)"}}>
        {caseNo?`症例 #${caseNo} の行に追記します`:"※ Hotlineから転用した症例のみシート保存できます"}
      </div>
    </div>
  );
}

function HotlineImportPanel({ onApply }) {
  const [status, setStatus] = useState(null); // null|'preview'|'applied'|'notfound'|'loading'
  const [hotlineData, setHotlineData] = useState(null);
  const [caseInput, setCaseInput] = useState('');

  const load = async () => {
    // YYYYMMDD-NNN または NNN（今日の日付を補完）の両方に対応
    const raw = caseInput.trim();
    let key = '';
    if (/^\d{8}-\d{3}$/.test(raw)) {
      // 完全形式: 20260531-001
      key = `hotline:case_${raw}`;
    } else if (/^\d{1,3}$/.test(raw)) {
      // 番号のみ: 今日の日付を補完
      const today = new Date();
      const dateStr = today.getFullYear().toString() +
        String(today.getMonth()+1).padStart(2,'0') +
        String(today.getDate()).padStart(2,'0');
      key = `hotline:case_${dateStr}-${raw.padStart(3,'0')}`;
    } else {
      setStatus('invalid');
      setTimeout(()=>setStatus(null), 3000);
      return;
    }
    setStatus('loading');
    try {
      // localStorage（GitHub Pages）またはwindow.storage（Claude.ai）から読み込み
      let value = null;
      try { value = localStorage.getItem(key); } catch(e) {}
      if (!value && window.storage) {
        try {
          const result = await window.storage.get(key, true);
          if (result?.value) value = result.value;
        } catch(e) {}
      }
      if (value) { setHotlineData(JSON.parse(value)); setStatus('preview'); }
      else { setStatus('notfound'); setTimeout(()=>setStatus(null),3000); }
    } catch(e) { setStatus('notfound'); setTimeout(()=>setStatus(null),3000); }
  };

  const apply = () => { onApply(hotlineData); setStatus('applied'); setHotlineData(null); setTimeout(()=>setStatus(null),3000); };

  const borderColor = status==='applied'?"rgba(34,197,94,.4)":status==='notfound'?"rgba(239,68,68,.3)":"rgba(56,189,248,.3)";

  return(
    <div style={{marginBottom:"18px",padding:"12px 14px",borderRadius:"var(--rs)",background:"rgba(56,189,248,.07)",border:`1px solid ${borderColor}`}}>
      <div style={{fontSize:"12px",fontWeight:700,color:"var(--blue-lt)",marginBottom:"4px"}}>🚑 Stroke Hotline から転用</div>
      <div style={{fontSize:"11px",color:"var(--txt3)",marginBottom:"10px"}}>Hotlineに表示された症例番号を入力してください（手入力も可）</div>

      {!status&&(
        <div style={{display:"flex",gap:"8px",alignItems:"center"}}>
          <div style={{flex:1,background:"var(--surf2)",border:"1px solid var(--bdr)",borderRadius:"var(--rs)",padding:"6px 10px"}}>
            <input type="text" value={caseInput}
              onChange={e=>setCaseInput(e.target.value.replace(/[^0-9\-]/g,'').slice(0,12))}
              onKeyDown={e=>e.key==='Enter'&&load()}
              placeholder="例：001 または 20260531-001"
              style={{width:"100%",background:"none",border:"none",outline:"none",fontFamily:"'Courier New',monospace",fontSize:"15px",fontWeight:700,color:"var(--txt)",letterSpacing:"0.05em"}}
            />
            <div style={{fontSize:"10px",color:"var(--txt3)",marginTop:"3px"}}>番号のみ入力で今日の日付を自動補完</div>
          </div>
          <button onClick={load} disabled={!caseInput}
            style={{padding:"10px 18px",borderRadius:"var(--rs)",border:"1px solid rgba(56,189,248,.4)",background:caseInput?"rgba(56,189,248,.15)":"var(--surf2)",color:caseInput?"var(--blue-lt)":"var(--txt3)",fontSize:"13px",fontWeight:700,cursor:caseInput?"pointer":"default",fontFamily:"inherit",flexShrink:0}}>
            読み込む
          </button>
        </div>
      )}

      {status==='loading'&&<div style={{fontSize:"12px",color:"var(--txt3)",padding:"8px 0"}}>読み込み中...</div>}
      {status==='invalid'&&<div style={{fontSize:"12px",color:"var(--amber-lt)",fontWeight:700}}>⚠ 形式が正しくありません（例：001 または 20260531-001）</div>}
      {status==='applied'&&<div style={{fontSize:"12px",color:"var(--green-lt)",fontWeight:700}}>✓ {hotlineData?.caseNo||caseInput} の情報を転用しました</div>}
      {status==='notfound'&&<div style={{fontSize:"12px",color:"var(--red-lt)",fontWeight:700}}>症例 {caseInput} が見つかりません</div>}

      {status==='preview'&&hotlineData&&(
        <div style={{marginTop:"8px"}}>
          <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"8px"}}>
            <span style={{fontFamily:"'Courier New',monospace",fontSize:"20px",fontWeight:800,color:"var(--blue-lt)"}}>#{hotlineData.caseNo}</span>
            <span style={{fontSize:"11px",color:"var(--txt3)"}}>{hotlineData.savedAt}</span>
            {hotlineData.chiefComplaint&&<span style={{fontSize:"11px",color:"var(--txt2)",background:"var(--surf2)",padding:"2px 8px",borderRadius:"4px"}}>{hotlineData.chiefComplaint}</span>}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"4px",marginBottom:"10px",fontSize:"12px"}}>
            {[
              ["年齢", hotlineData.age?`${hotlineData.age}歳`:"未入力"],
              ["性別", hotlineData.sex||"未入力"],
              ["病前mRS", hotlineData.premrs!=null?`${hotlineData.premrs}点`:"未入力"],
              ["高血圧", hotlineData.ht?"あり":"なし"],
              ["糖尿病", hotlineData.dm?"あり":"なし"],
              ["AF既往", hotlineData.af?"あり":"なし"],
              ["発症", hotlineData.onsetType==="clear"?"時刻明確":"不明/Wake-up"],
              ["BP右", hotlineData.bpRightSys?`${hotlineData.bpRightSys}/${hotlineData.bpRightDia}`:"未入力"],
              ["JCS", hotlineData.jcs||"未入力"],
              ["瞳孔", (hotlineData.pupilR&&hotlineData.pupilL)?`右${hotlineData.pupilR}/左${hotlineData.pupilL}mm`:"未入力"],
            ].map(([k,v])=>(
              <div key={k} style={{padding:"4px 8px",borderRadius:"4px",background:"var(--surf2)",display:"flex",justifyContent:"space-between",gap:"6px"}}>
                <span style={{color:"var(--txt3)"}}>{k}</span><span style={{color:"var(--txt)",fontWeight:600}}>{v}</span>
              </div>
            ))}
          </div>
          <div style={{display:"flex",gap:"8px"}}>
            <button onClick={apply} style={{flex:1,padding:"9px",borderRadius:"var(--rs)",border:"none",background:"var(--teal)",color:"#fff",fontSize:"13px",fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>✓ この内容で転用する</button>
            <button onClick={()=>{setStatus(null);setHotlineData(null);}} style={{padding:"9px 14px",borderRadius:"var(--rs)",border:"1px solid var(--bdr)",background:"none",color:"var(--txt2)",fontSize:"13px",cursor:"pointer",fontFamily:"inherit"}}>キャンセル</button>
          </div>
        </div>
      )}
    </div>
  );
}

function StrokeAlgo() {
  // ── Phase & navigation ──
  const [phase, setPhase]       = useState(0);
  const [navStack, setNavStack] = useState([]);
  const [history, setHistory]   = useState([]);
  const [caseNo, setCaseNo]     = useState(null); // Hotlineから転用した症例番号 // [{key,label,val}]
  const [result, setResult]   = useState(null);

  // ── Phase 1: Pre-hospital ──
  const [age, setAge]           = useState(70);
  const [sex, setSex]           = useState(null);   // null|"male"|"female"
  const [premrs, setPremrs]     = useState(null);   // null|0|1|2|3|4|5
  const [onset, setOnset]       = useState(null);
  const [discoveryH, setDiscoveryH] = useState(null);
  // 既往歴
  const [htn, setHtn]           = useState(null); // null|true|false 高血圧
  const [dm, setDm]             = useState(null);  // null|true|false 糖尿病
  const [afibHx, setAfibHx]    = useState(null);  // null|true|false 心房細動の既往
  const [acMeds, setAcMeds]     = useState([]);
  const [apMeds, setApMeds]     = useState([]);
  const [lastAcTime, setLastAcTime] = useState("");

  // ── Phase 2: ED ──
  // Vitals
  const [sbpR, setSbpR]         = useState(160);
  const [dbpR, setDbpR]         = useState(90);
  const [sbpL, setSbpL]         = useState(160);
  const [dbpL, setDbpL]         = useState(90);
  const [showBpL, setShowBpL]   = useState(false);
  const [hrStatus, setHrStatus] = useState(null);   // null|"tachy"|"normal"|"brady"
  const [afibVital, setAfibVital] = useState(false); // 心房細動（バイタル欄）
  const [o2Use, setO2Use]       = useState(null);
  const [fever, setFever]       = useState(null);
  // 意識レベル（JCS）
  const [jcs, setJcs]           = useState(null);   // null|0|1|2|3|10|20|30|100|200|300
  // 瞳孔
  const [pupilR, setPupilR]     = useState(3);      // mm
  const [pupilL, setPupilL]     = useState(3);
  const [pupilRreact, setPupilRreact] = useState(null); // null|true|false
  const [pupilLreact, setPupilLreact] = useState(null);
  // ECG（別セクションに残す）
  const [stChange, setStChange] = useState(null);
  // Neuro
  const [nihss, setNihss]         = useState(8);
  // 症状選択
  // 片麻痺: null | "right_mild" | "right_severe" | "left_mild" | "left_severe"
  // 片麻痺を上肢・下肢に分解
  // null | "right" | "left"
  const [armParesis, setArmParesis]     = useState(null);
  const [legParesis, setLegParesis]     = useState(null);
  // 顔面麻痺: null | "right" | "left"（タップでサイクル）
  const [facialPalsy, setFacialPalsy]   = useState(null);
  const [gaze, setGaze]               = useState(null);
  // 半側空間無視: null | "right" | "left"
  const [neglect, setNeglect]         = useState(null);
  // ON/OFF症状
  const [loc, setLoc]                 = useState(false); // 意識障害
  const [aphasia, setAphasia]         = useState(false); // 失語
  const [diplopia, setDiplopia]       = useState(false); // 複視
  const [ataxia, setAtaxia]           = useState(false); // 失調
  const [vertigo, setVertigo]         = useState(false); // めまい
  const [seizure, setSeizure]         = useState(false); // 痙攣
  const [lesionSide, setLesionSide]   = useState(null);  // "right_ant"|"left_ant"|"posterior"
  // Neck echo - 病側/健側の順序は症状から決定
  const [necSick_flap, setNecSick_flap]           = useState(null);
  const [necSick_occl, setNecSick_occl]           = useState(null);    // null|true|false (閉塞の有無)
  const [necSick_occlSite, setNecSick_occlSite]   = useState(null);    // "CCA"|"ICA"
  const [necSick_occlType, setNecSick_occlType]   = useState([]);      // ["atheroma","thrombus"]
  const [necSick_findings, setNecSick_findings]   = useState([]);      // ["stenosis","plaque","thrombus_like","web"]
  const [necSick_edv, setNecSick_edv]             = useState("");
  const [necWell_flap, setNecWell_flap]           = useState(null);
  const [necWell_edv, setNecWell_edv]             = useState("");
  // 椎骨動脈（任意）
  const [showVA, setShowVA]                       = useState(false);
  const [vaR_edv, setVaR_edv]                     = useState("");
  const [vaL_edv, setVaL_edv]                     = useState("");
  // CXR
  const [mediastinum, setMediastinum] = useState(null);

  // ── Phase 3: Imaging ──
  const [imagingRec, setImagingRec] = useState(null);
  const [mriOk, setMriOk]     = useState(null);
  const [showMriChk, setShowMriChk] = useState(false);
  const [imgChoice, setImgChoice] = useState(null);
  const [imgResultTag, setImgResultTag] = useState(null);
  // sub-steps
  const [imgSubStep, setImgSubStep] = useState(null);
  const [aspects, setAspects] = useState(8);
  const [aspectsOk, setAspectsOk] = useState(false);
  const [ichVol, setIchVol]   = useState(20);
  const [ichVolOk, setIchVolOk] = useState(false);
  // wake-up DWI/FLAIR
  const [dwiPos, setDwiPos]   = useState(null);
  const [flairPos, setFlairPos] = useState(null);
  // CT詳細評価
  const [ctHemorrhage, setCtHemorrhage] = useState(null);   // null|true|false
  const [aspectsTapped, setAspectsTapped] = useState([]);   // 減点した部位のarray
  const [hyperdense, setHyperdense]     = useState(null);   // null|true|false
  const [ctap, setCtap]                 = useState(null);   // null|true|false (CTAP施行)
  const [occludedVessel, setOccludedVessel] = useState([]); // 複数選択可
  const [largeCoreEst, setLargeCoreEst] = useState(null);   // null|true|false
  const [mismatch, setMismatch]         = useState(null);   // null|true|false
  // 詳細灌流入力モード（CT/MRI共通）
  const [perfDetailMode, setPerfDetailMode] = useState(false); // false=簡易, true=詳細
  const [coreVol, setCoreVol]           = useState("");     // Core volume (mL)
  const [tmaxVol, setTmaxVol]           = useState("");     // Tmax>6s volume (mL)
  const [mriLargeCore, setMriLargeCore] = useState(null);
  const [mriMismatch, setMriMismatch]   = useState(null);
  const [mriPerfDetailMode, setMriPerfDetailMode] = useState(false);
  const [mriCoreVol, setMriCoreVol]     = useState("");
  const [mriTmaxVol, setMriTmaxVol]     = useState("");
  const [noCtapAction, setNoCtapAction] = useState(null);
  // MRI詳細評価
  const [mriDwiPos, setMriDwiPos]       = useState(null);
  const [mriAspectsTapped, setMriAspectsTapped] = useState([]);
  const [pcAspectsTapped, setPcAspectsTapped]   = useState([]);
  const [mriT2starHemorrhage, setMriT2starHemorrhage] = useState(null);
  const [mriOccluded, setMriOccluded]   = useState([]);
  // 大動脈解離CTA結果
  const [aortaCtaResult, setAortaCtaResult] = useState(null); // null|"confirmed_A"|"confirmed_B"|"denied"

  // ── Derived ──
  const ni = nihssInfo(nihss);
  const ai = aspectsInfo(aspects);
  const ii = ichVolInfo(ichVol);
  const sbpDiff = showBpL ? Math.abs(sbpR - sbpL) : 0;
  const aoPos = sbpR < 110 || (showBpL && sbpDiff >= 20)
    || necSick_flap === true || necWell_flap === true || mediastinum === true;

  // 症状から頸部エコーの病側を決定
  // 左片麻痺 or 右共同偏視 → 右CCAが病側
  // 右片麻痺 or 左共同偏視 or 失語 → 左CCAが病側
  const ccaSick = (() => {
    if ((armParesis==="left"||legParesis==="left"||facialPalsy==="left") || gaze==="right") return "right";
    if ((armParesis==="right"||legParesis==="right"||facialPalsy==="right") || gaze==="left" || aphasia) return "left";
    return null;
  })();
  const cca_sick_side = ccaSick;
  const cca_sick_label  = cca_sick_side === "right" ? "右総頸動脈（病側）" : cca_sick_side === "left" ? "左総頸動脈（病側）" : "総頸動脈（病側）";
  const cca_well_label  = cca_sick_side === "right" ? "左総頸動脈（健側）" : cca_sick_side === "left" ? "右総頸動脈（健側）" : "総頸動脈（健側）";

  // EDV比
  const sickEdv = parseFloat(necSick_edv) || 0;
  const wellEdv = parseFloat(necWell_edv) || 0;
  const edvRatio = (sickEdv > 0 && wellEdv > 0) ? wellEdv / sickEdv : null;
  const lvoSuspect = edvRatio !== null && edvRatio >= 1.4;

  // 後方循環
  const vaREdv = parseFloat(vaR_edv) || 0;
  const vaLEdv = parseFloat(vaL_edv) || 0;

  // ④ 脳ヘルニア徴候
  const pupilDiff = Math.abs(pupilR - pupilL);
  const bothDilated = pupilR >= 5.0 && pupilL >= 5.0;
  const herniationSign = jcs !== null && (
    jcs >= 200 ||
    (jcs >= 30 && pupilDiff >= 1) ||
    (jcs >= 30 && bothDilated)
  );
  const cortical = aphasia || !!gaze || !!neglect;
  const posteriorSymp = diplopia || ataxia || vertigo;
  const hemiplegia = armParesis || legParesis; // 後方互換用（どちらかあれば麻痺あり）
  const sympPattern = (() => {
    if (loc || cortical) return "高";
    if (armParesis || legParesis || diplopia || ataxia) return "中";
    if (facialPalsy || vertigo || seizure || aphasia) return "低";
    return null;
  })();
  const lesionSuggestion = (() => {
    if (posteriorSymp && !armParesis && !legParesis && !aphasia && !gaze && !neglect) return "posterior";
    if (gaze==="right"||neglect==="right"||facialPalsy==="left"||armParesis==="left"||legParesis==="left") return "left_ant";
    if (gaze==="left"||neglect==="left"||facialPalsy==="right"||armParesis==="right"||legParesis==="right") return "right_ant";
    return null;
  })();

  // 後方循環：椎骨動脈EDV低下疑い
  const mriOkFinal = mriOk !== false;

  // ── ABC²Dスコア計算（Liao et al. J Neurosurg 2022）─────────────────────────
  // A（AF）: 既往AF または 来院時AFのいずれかあり → 0点、どちらもなし → +3点
  const afibAny = afibHx === true || afibVital === true;
  const abc2d_A = afibAny ? 0 : 3;
  // B（Blood pressure / 高血圧既往）: あり → +1
  const abc2d_B = htn===true ? 1 : 0;
  // C²（Clinical neurological deficit / NIHSS <7）: <7 → +1
  const abc2d_C2 = nihss < 7 ? 1 : 0;
  // C（CTHS / CT hyperdense sign なし）: なし → +1（CT施行後に確定）
  const abc2d_CTHS = hyperdense===false ? 1 : 0;
  // D（Diabetes mellitus）: あり → +1
  const abc2d_D = dm===true ? 1 : 0;
  const abc2dScore = abc2d_A + abc2d_B + abc2d_C2 + abc2d_CTHS + abc2d_D;
  // 既往または来院時のAFが確認されていれば算出可能
  const abc2dAvailable = afibHx !== null || afibVital !== null;
  // カットオフ ≥4：ICAS-O高疑い（感度90.9%・特異度72.8%・精度82.2%）
  const icasHigh = abc2dAvailable && abc2dScore >= 4;

  // ── LVOスケール（日本脳卒中学会推奨・6項目）──────────────────────────────
  const lvoScale = {
    irregular: afibAny ? 1 : 0,
    gaze:      !!gaze ? 1 : 0,
    neglect:   !!neglect ? 1 : 0,
    aphasia:   aphasia ? 1 : 0,
    facial:    !!facialPalsy ? 1 : 0,
    arm:       !!armParesis ? 1 : 0,
  };
  const lvoScaleTotal = Object.values(lvoScale).reduce((a,b)=>a+b,0);
  const lvoScalePos = lvoScaleTotal >= 3;

  // ── Helpers ──
  const addHistory = useCallback((key, label, val) => {
    setHistory(h => [...h.filter(x => x.key !== key), {key, label, val}]);
  }, []);

  function recIsMriFirst(rec) {
    // stepのテキストの先頭モダリティ（<strong>直後）がMRIまたはDWIの場合のみtrue
    return rec?.steps?.some(s =>
      s.text?.includes("<strong>MRI") || s.text?.includes("<strong>DWI")
    );
  }

  function pushNav() {
    setNavStack(s => [...s, {
      // Navigation state
      phase, imgSubStep, aspectsOk, ichVolOk, imgChoice,
      showMriChk, imagingRec, imgResultTag,
      history:[...history],
      // Phase 0 (prehospital) state
      age, sex, premrs, onset, discoveryH,
      htn, dm, afibHx, acMeds:[...acMeds], apMeds:[...apMeds], lastAcTime,
      // Phase 1 (ED) state
      sbpR, dbpR, sbpL, dbpL, showBpL,
      hrStatus, afibVital, o2Use, fever,
      jcs, pupilR, pupilL, pupilRreact, pupilLreact,
      nihss, loc, facialPalsy, armParesis, legParesis,
      aphasia, gaze, neglect, diplopia, ataxia, vertigo, seizure,
      stChange,
      // Phase 2 (imaging) state
      ctHemorrhage, aspectsTapped:[...aspectsTapped], hyperdense,
      ctap, occludedVessel:[...occludedVessel], largeCoreEst, mismatch,
      perfDetailMode, coreVol, tmaxVol, noCtapAction,
      mriDwiPos, mriAspectsTapped:[...mriAspectsTapped],
      pcAspectsTapped:[...pcAspectsTapped],
      mriT2starHemorrhage, mriOccluded:[...mriOccluded],
      mriLargeCore, mriMismatch, mriPerfDetailMode, mriCoreVol, mriTmaxVol,
      aortaCtaResult, dwiPos, flairPos,
    }]);
  }

  function goBack() {
    if (!navStack.length) return;
    const p = navStack[navStack.length - 1];
    setNavStack(s => s.slice(0, -1));
    // Navigation
    setPhase(p.phase); setImgSubStep(p.imgSubStep);
    setAspectsOk(p.aspectsOk); setIchVolOk(p.ichVolOk);
    setImgChoice(p.imgChoice);
    setShowMriChk(p.showMriChk ?? false);
    if (p.imagingRec !== undefined) setImagingRec(p.imagingRec);
    if (p.imgResultTag !== undefined) setImgResultTag(p.imgResultTag);
    setHistory(p.history);
    setResult(null);
    // Phase 0
    setAge(p.age); setSex(p.sex); setPremrs(p.premrs);
    setOnset(p.onset); setDiscoveryH(p.discoveryH);
    setHtn(p.htn); setDm(p.dm); setAfibHx(p.afibHx);
    setAcMeds(p.acMeds); setApMeds(p.apMeds); setLastAcTime(p.lastAcTime);
    // Phase 1
    setSbpR(p.sbpR); setDbpR(p.dbpR); setSbpL(p.sbpL); setDbpL(p.dbpL);

    setStChange(p.stChange);

    setCtHemorrhage(p.ctHemorrhage); setAspectsTapped(p.aspectsTapped);

    setPcAspectsTapped(p.pcAspectsTapped); setMriT2starHemorrhage(p.mriT2starHemorrhage);
    setMriOccluded(p.mriOccluded); setMriLargeCore(p.mriLargeCore);
    setMriMismatch(p.mriMismatch); setMriPerfDetailMode(p.mriPerfDetailMode);

    setAortaCtaResult(p.aortaCtaResult); setDwiPos(p.dwiPos); setFlairPos(p.flairPos);

  }

  // ── Phase advance handlers ──
  function finishPrehospital() {
    pushNav();
    window.scrollTo({top:0, behavior:"smooth"});
    addHistory("age",   "年齢",       `${age}歳`);
    if (sex)  addHistory("sex",   "性別",       sex==="male"?"男性":"女性");
    if (premrs!==null) addHistory("premrs","病前mRS", premrs==="unknown" ? "不明" : `${premrs}点（${["完全自立","ほぼ自立","軽度障害","中等度障害","中等度〜重度障害","重度障害"][premrs]}）`);
    if (htn!==null) addHistory("htn","高血圧",htn?"あり":"なし");
    if (dm!==null)  addHistory("dm", "糖尿病",  dm ?"あり":"なし");
    if (afibHx!==null) addHistory("afibHx","心房細動（既往）",afibHx?"あり":"なし");
    addHistory("onset","発症時刻",onset==="lkw_early"?"LKW≤4.5h":onset==="lkw_mid"?"LKW 4.5–24h":"LKW 24h超");
    if (onset==="lkw_mid" && discoveryH && discoveryH!=="clear") addHistory("discovery","発見からの経過", discoveryH==="unknown_within4.5"?"発見から4.5h以内":"発見から4.5h超（IVT適応なし）");
    if (acMeds.length) addHistory("ac", "抗凝固薬", acMeds.map(id => MEDS_AC.find(m=>m.id===id)?.name).join("・"));
    if (apMeds.length) addHistory("ap", "抗血小板薬", apMeds.map(id => MEDS_AP.find(m=>m.id===id)?.name).join("・"));
    setPhase(1);
  }

  function finishED() {
    pushNav();
    const rec = getImagingRec(onset, sympPattern||"低", true, discoveryH, herniationSign);
    setImagingRec(rec);
    // MRI禁忌確認はhandleImgChoiceで1st choice選択時に行う
    if (aoPos) {
      setImgSubStep("aorta_cta");
      setPhase(2);
    } else setPhase(2);
    // 履歴記録
    const bpStr = showBpL
      ? `右${sbpR}/${dbpR} / 左${sbpL}/${dbpL} mmHg（収差${sbpDiff}）`
      : `右${sbpR}/${dbpR} mmHg`;
    addHistory("bp",   "BP",         bpStr);
    if (sbpR<110) addHistory("bp_warn","BP警告","右SBP<110→解離疑い");
    if (hrStatus)  addHistory("hr",  "HR",       hrStatus==="tachy"?"頻脈":hrStatus==="brady"?"徐脈":"正常");
    if (afibVital) addHistory("af",  "心房細動",  "あり");
    if (o2Use!==null) addHistory("o2","酸素投与", o2Use?"あり":"なし");
    if (fever!==null) addHistory("fev","発熱",    fever?"あり（≥37.5℃）":"なし");
    if (jcs!==null)   addHistory("jcs","JCS",    `${jcs}（${jcsLabel(jcs)}）`);
    const pupilStr = `右${pupilR}mm${pupilRreact===true?"・対光反射(+)":pupilRreact===false?"・対光反射(-)":""} / 左${pupilL}mm${pupilLreact===true?"・対光反射(+)":pupilLreact===false?"・対光反射(-)":""}`;
    addHistory("pupil","瞳孔",        pupilStr);
    addHistory("nihss","NIHSS",       `${nihss}点（${ni.l}）`);
    const sympList = [
      loc&&"意識障害",
      facialPalsy&&`顔面麻痺（${facialPalsy==="right"?"右":"左"}）`,
      armParesis&&`上肢麻痺（${armParesis==="right"?"右":"左"}）`,
      legParesis&&`下肢麻痺（${legParesis==="right"?"右":"左"}）`,
      aphasia&&"失語",
      gaze&&`共同偏視（${gaze==="right"?"右":"左"}）`,
      neglect&&`半側空間無視（${neglect==="right"?"右":"左"}）`,
      diplopia&&"複視", ataxia&&"失調", vertigo&&"めまい", seizure&&"痙攣",
    ].filter(Boolean);
    if (sympList.length) addHistory("symp","症状",sympList.join("・"));
    if (cortical) addHistory("cortical","皮質症状","あり");
    addHistory("sev","重症度（自動）",sympPattern==="高"?"重症相当":sympPattern==="中"?"中等症相当":sympPattern==="低"?"軽症相当":"未定");
    if (stChange!==null) addHistory("st","ST変化",stChange?"ST変化あり":"ST変化なし");
    if (necSick_edv||necWell_edv) addHistory("edv","頸部エコー EDV",
      `${cca_sick_label} ${necSick_edv||"?"}cm/s / ${cca_well_label} ${necWell_edv||"?"}cm/s${edvRatio!==null?` → 比${edvRatio.toFixed(2)}${lvoSuspect?" ⚠LVO疑い":""}`:""}`)
    if (necSick_occl===true) addHistory("occl","頸部エコー閉塞",`${necSick_occlSite||"?"} 閉塞（${necSick_occlType.join("・")||"性状未選択"}）`);
    if (showVA&&(vaR_edv||vaL_edv)) addHistory("va_edv","椎骨動脈 EDV",`右${vaR_edv||"?"}cm/s / 左${vaL_edv||"?"}cm/s`);
    if (mediastinum!==null) addHistory("med","縦隔拡大",mediastinum?"縦隔拡大あり（陽性）":"縦隔拡大なし");
    addHistory("aorta","大動脈解離スクリーニング",aoPos?`⚠ 陽性（${[sbpR<110&&"右SBP<110",showBpL&&sbpDiff>=20&&`収差${sbpDiff}`,necSick_flap===true&&"flap(+)",mediastinum===true&&"縦隔拡大"].filter(Boolean).join("・")}）`:"陰性");
    if (lvoSuspect) addHistory("lvo_echo","頸部エコー LVO疑い",`健側/病側 EDV比 = ${edvRatio.toFixed(2)}（≥1.4）→ 脳主幹動脈閉塞を疑う`);
    // レンダリング後にスクロール
    setTimeout(() => window.scrollTo({top:0, behavior:"smooth"}), 50);
  }

  function handleMriChk(ok) {
    pushNav();
    setTimeout(()=>window.scrollTo({top:0,behavior:"smooth"}),50);
    setMriOk(ok);
    addHistory("mri_ci", "MRI禁忌", ok?"禁忌なし":"禁忌あり（CT使用）");
    setShowMriChk(false);

    const isWakeup = onset==="lkw_mid"&&(discoveryH==="unknown_within4.5"||discoveryH==="unknown_beyond4.5");

    if (!ok) {
      // MRI禁忌あり → CT 2nd choiceとして処理
      const rec2 = getImagingRec(onset, sympPattern||"低", false, discoveryH, herniationSign);
      setImagingRec(rec2);
      setImgChoice("2nd");
      addHistory("img_choice_upd","実施画像（変更）","⚠ MRI禁忌のためCT（2nd choice）に切替");
      setImgSubStep("image_result");
    } else {
      // MRI禁忌なし → 1st choiceを確定してMRIルートへ
      setImgChoice("1st");
      const usedMri = recIsMriFirst(imagingRec); // 1st choiceのstepsで判定
      if (isWakeup && usedMri && discoveryH==="unknown_within4.5") {
        setImgSubStep("wakeup_dwi");
      } else if (usedMri && !isWakeup) {
        setImgSubStep("mri_dwi");
      } else {
        setImgSubStep("image_result");
      }
    }
  }

  function recIsAltMri(rec) {
    // altの先頭stepがMRI/DWIのとき true（2nd choiceがMRI）
    return rec?.alt?.some(s =>
      s.text?.includes("<strong>MRI") || s.text?.includes("<strong>DWI")
    );
  }

  function handleImgChoice(choice) {
    pushNav(); setTimeout(()=>window.scrollTo({top:0,behavior:"smooth"}),50);
    addHistory("img_choice","実施画像",choice==="1st"?"✓ 1st choice":"⚠ 2nd choice");

    const isWakeup = onset==="lkw_mid"&&(discoveryH==="unknown_within4.5"||discoveryH==="unknown_beyond4.5");

    // 実際に施行されるのがMRIかCTかを判定
    const usedMri = choice==="1st"
      ? recIsMriFirst(imagingRec)   // 1st choiceの場合：stepsで判定
      : recIsAltMri(imagingRec);    // 2nd choiceの場合：altで判定

    // 1st choice かつ MRI-first かつ MRI禁忌未確認 → imgChoiceを保留してMRI禁忌確認
    if (choice==="1st" && usedMri && mriOk === null) {
      setShowMriChk(true);
      return;
    }

    // CT施行 or 2nd choice or MRI禁忌確認済み → imgChoiceを確定してルーティング
    setImgChoice(choice);
    if (isWakeup && usedMri && discoveryH==="unknown_within4.5") {
      setImgSubStep("wakeup_dwi");
    } else if (usedMri && !isWakeup) {
      setImgSubStep("mri_dwi");
    } else {
      setImgSubStep("image_result");
    }
  }

  function handleImgResult(tag, next) {
    pushNav(); setTimeout(()=>window.scrollTo({top:0,behavior:"smooth"}),50);
    addHistory("img_result","画像所見",tag);
    setImgResultTag(tag);
    if (next.startsWith("RESULT:")) { setResult(RESULTS[next.replace("RESULT:","")]); setPhase(3); }
    else setImgSubStep(next);
  }

  function handleLvoTime(tag, resultKey) {
    pushNav(); setTimeout(()=>window.scrollTo({top:0,behavior:"smooth"}),50);
    addHistory("lvo_time","LVO時間窓",tag);
    setResult(RESULTS[resultKey]); setPhase(3);
  }

  function handleMevoSev(tag, resultKey) {
    pushNav(); setTimeout(()=>window.scrollTo({top:0,behavior:"smooth"}),50);
    addHistory("mevo_sev","MeVO重症度",tag);
    setResult(RESULTS[resultKey]); setPhase(3);
  }

  function handleWakeupDwi(pos) {
    pushNav(); setTimeout(()=>window.scrollTo({top:0,behavior:"smooth"}),50);
    addHistory("dwi","DWI",pos?"DWI(+)":"DWI(-)");
    setDwiPos(pos);
    if (!pos) { setResult(RESULTS.r_dwi_neg); setPhase(3); return; }
    setImgSubStep("wakeup_flair");
  }

  function handleWakeupFlair(pos) {
    pushNav(); setTimeout(()=>window.scrollTo({top:0,behavior:"smooth"}),50);
    addHistory("flair","FLAIR",pos?"FLAIR(+) Mismatch(−)":"FLAIR(−) Mismatch(+)");
    setFlairPos(pos);
    setImgSubStep(pos ? "wakeup_vessel_neg" : "wakeup_vessel_pos");
  }

  function handleWakeupVessel(tag, resultKey) {
    pushNav(); setTimeout(()=>window.scrollTo({top:0,behavior:"smooth"}),50);
    addHistory("vessel","血管閉塞",tag);
    setResult(RESULTS[resultKey]); setPhase(3);
  }

  function handleAspectsOk() {
    pushNav(); setTimeout(()=>window.scrollTo({top:0,behavior:"smooth"}),50);
    addHistory("aspects","ASPECTS",`${aspects}点（${ai.l}）`);
    setAspectsOk(true);
  }

  function handleIchVolOk() {
    pushNav(); setTimeout(()=>window.scrollTo({top:0,behavior:"smooth"}),50);
    addHistory("ich_vol","血腫量",`${ichVol} mL（${ii.l}）`);
    setIchVolOk(true);
  }

  function reset() {
    setPhase(0); setHistory([]); setResult(null);
    setAge(70); setSex(null); setPremrs(null);
    setHtn(null); setDm(null); setAfibHx(null);
    setOnset(null); setDiscoveryH(null); setAcMeds([]); setApMeds([]); setLastAcTime("");
    setSbpR(160); setDbpR(90); setSbpL(160); setDbpL(90); setShowBpL(false);
    setHrStatus(null); setAfibVital(false); setO2Use(null); setFever(null);
    setJcs(null); setPupilR(3); setPupilL(3); setPupilRreact(null); setPupilLreact(null);
    setStChange(null);
    setNecSick_flap(null); setNecSick_occl(null); setNecSick_occlSite(null);
    setNecSick_occlType([]); setNecSick_findings([]); setNecSick_edv("");
    setNecWell_flap(null); setNecWell_edv("");

    setLesionSide(null); setMediastinum(null);
    setNihss(8);
    setArmParesis(null); setLegParesis(null); setFacialPalsy(null);
    setGaze(null); setNeglect(null);
    setLoc(false); setAphasia(false); setDiplopia(false);
    setAtaxia(false); setVertigo(false); setSeizure(false);
    setLesionSide(null);
    setImagingRec(null); setMriOk(null); setShowMriChk(false); setImgChoice(null); setCaseNo(null);
    setImgResultTag(null); setImgSubStep(null);
    setAspects(8); setAspectsOk(false); setIchVol(20); setIchVolOk(false);
    setDwiPos(null); setFlairPos(null);
    setCtHemorrhage(null); setAspectsTapped([]); setHyperdense(null);
    setCtap(null); setOccludedVessel([]); setLargeCoreEst(null);
    setMismatch(null); setNoCtapAction(null);
    setPerfDetailMode(false); setCoreVol(""); setTmaxVol("");
    setMriLargeCore(null); setMriMismatch(null);
    setMriPerfDetailMode(false); setMriCoreVol(""); setMriTmaxVol("");
