    setAortaCtaResult(null);
  }

  // ── Progress calc ──
  const progress = result ? 100 : phase===0 ? 15 : phase===1 ? 40 : phase===2 ? 70 : 95;

  // ── Criteria for result panel ──
  const criteriaRows = (() => {
    if (!result) return [];
    const rows = [];
    const onH = onset==="lkw_early"?4:onset==="lkw_mid"?12:999;
    const isVasc = result.title?.includes("LVO")||result.title?.includes("MeVO")||result.title?.includes("Wake-up");
    if (isVasc) {
      rows.push({label:`IVT適応ウィンドウ（≤4.5h）`, met:onH<=4.5, cls:onH<=4.5?"met":"unmet"});
      rows.push({label:`NIHSS ≥6（EVT一般基準）― ${nihss}点`, met:nihss>=6, cls:nihss>=6?"met":"unmet"});
      rows.push({label:`NIHSS ≥10（DAWN基準）― ${nihss}点`, met:nihss>=10, cls:nihss>=10?"met":"warn"});
      rows.push({label:`NIHSS ≥8（RESCUE-M2O基準）― ${nihss}点`, met:nihss>=8, cls:nihss>=8?"met":"warn"});
      if (age<80) rows.push({label:`年齢 <80歳（DAWN基準コア<51mL対象）― ${age}歳`, met:true, cls:"met"});
      else rows.push({label:`年齢 ≥80歳（DAWNコア<21mL）― ${age}歳`, met:true, cls:"warn"});
      if (aspectsOk) {
        rows.push({label:`ASPECTS ≥6（標準EVT）― ${aspects}点`, met:aspects>=6, cls:aspects>=6?"met":"unmet"});
        rows.push({label:`ASPECTS ≥5（SKIP-EXTEND）― ${aspects}点`, met:aspects>=5, cls:aspects>=5?"met":"warn"});
        rows.push({label:`ASPECTS ≥8（RESCUE-M2O）― ${aspects}点`, met:aspects>=8, cls:aspects>=8?"met":"warn"});
        if (aspects<=5) rows.push({label:`Large core EVT（ASPECTS 0–5, SELECT2/ANGEL-ASPECT）― ${aspects}点`, met:true, cls:"warn"});
      }
    }
    if (result.ichDetail && ichVolOk) {
      rows.push({label:`FASTEST Part 2 血腫量基準（2–60 mL）― ${ichVol} mL`, met:ichVol>=2&&ichVol<=60, cls:ichVol>=2&&ichVol<=60?"met":"unmet"});
      rows.push({label:`FASTEST Part 2 発症時刻（≤2h）`, met:onH<=2, cls:onH<=2?"met":"warn"});
      rows.push({label:`被殻出血 外科適応目安（≥31 mL）― ${ichVol} mL`, met:ichVol>=31, cls:ichVol>=31?"warn":"unmet"});
      rows.push({label:`小脳出血 外科適応目安（≥14 mL）― ${ichVol} mL`, met:ichVol>=14, cls:ichVol>=14?"warn":"unmet"});
    }
    return rows;
  })();

  // ── Render helpers ──
  const secHdStyle = {fontSize:"12px",fontWeight:700,color:"var(--txt2)",textTransform:"uppercase",letterSpacing:".06em",marginBottom:"8px"};
  const bpLblStyle = {fontSize:"12px",color:"var(--txt2)",minWidth:"90px"};
  const posBadgeStyle = {fontSize:"11px",fontWeight:700,color:"var(--red-lt)",background:"rgba(239,68,68,.1)",border:"1px solid rgba(239,68,68,.3)",borderRadius:"4px",padding:"2px 7px"};
  const posBannerStyle = {padding:"7px 10px",borderRadius:"var(--rs)",background:"rgba(239,68,68,.07)",border:"1px solid rgba(239,68,68,.3)",fontSize:"12px",color:"var(--red-lt)"};
  function jcsLabel(v){return{0:"清明",1:"呼びかけで開眼",2:"刺激で開眼",3:"刺激で開眼しない",10:"呼びかけで従命",20:"刺激で払いのける",30:"刺激に反応しない",100:"自発的に開眼・発語なし",200:"刺激で開眼・発語なし",300:"刺激でも開眼しない"}[v]||"";}
  function jcsColor(v){if(v===0)return"var(--green-lt)";if(v<=3)return"var(--teal-lt)";if(v<=30)return"var(--amber-lt)";return"var(--red-lt)";}
  function sympBtnStyle(active, isSevere) {
    return {
      display:"flex", alignItems:"center", gap:"8px", width:"100%",
      padding:"10px 13px", borderRadius:"var(--rs)", cursor:"pointer",
      fontFamily:"inherit", fontSize:"13px", textAlign:"left",
      background: active ? (isSevere ? "rgba(239,68,68,.08)" : "rgba(13,148,136,.07)") : "var(--surf2)",
      border: "1px solid var(--bdr)",
      transition:"all .18s",
    };
  }
  function toggleStyle(state, val, posColor) {
    const isActive = val !== null ? state === val : state === null;
    const isPos = val === true;
    return {
      border: `1px solid ${isActive ? (isPos ? "rgba(239,68,68,.5)" : val === false ? "rgba(34,197,94,.4)" : "rgba(59,130,246,.4)") : "var(--bdr)"}`,
      background: isActive ? (isPos ? "rgba(239,68,68,.1)" : val === false ? "rgba(34,197,94,.07)" : "rgba(59,130,246,.08)") : "var(--surf2)",
      color: isActive ? (isPos ? "var(--red-lt)" : val === false ? "var(--green-lt)" : "var(--blue-lt)") : "var(--txt2)",
    };
  }

  function PhaseStep({idx}){
    const done=phase>idx,active=phase===idx;
    return(<div className="step-node">
      <div className={`step-dot${done?" done":active?" active":""}`}>{done?"✓":idx+1}</div>
      <div className={`step-lbl${active?" active":""}`}>{PHASES[idx]}</div>
    </div>);
  }

  function TrailPanel(){
    if(!history.length)return null;
    return(<div className="trail"><div className="trail-hd">選択の経緯</div><div className="trail-items">
      {history.map((h,i)=><div key={i} className="trail-row"><span className="trail-k">{h.label}:</span><span className="trail-v">{h.val}</span></div>)}
    </div></div>);
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // RENDER
  // ═══════════════════════════════════════════════════════════════════════════
  return(
  <><style>{CSS}</style>
  <div className="app">

    {/* Header */}
    <div className="hdr">
      <div className="hdr-top">
        <span className="badge">Stroke Algorithm</span>
        <span className="badge-gl">AHA/ASA 2026 Guideline準拠</span>
      </div>
      <h1>急性期脳卒中<br/>画像診断・治療アルゴリズム</h1>
      <div className="hdr-sub">来院前情報 → 救急外来所見 → 画像診断 → 治療方針</div>
    </div>

    {/* Phase stepper */}
    <div className="stepper">
      {PHASES.map((_,i)=>(
        <div key={i} style={{display:"flex",alignItems:"flex-start",flex:i<PHASES.length-1?"1 1 0":"0 0 auto"}}>
          <PhaseStep idx={i}/>
          {i<PHASES.length-1&&<div className={`step-line${phase>i?" done":""}`}/>}
        </div>
      ))}
    </div>

    {/* Progress */}
    <div className="prog"><div className="prog-fill" style={{width:`${progress}%`}}/></div>

    <TrailPanel/>

    {/* 戻るボタン */}
    {navStack.length > 0 && (
      <button onClick={goBack}
        style={{display:"flex",alignItems:"center",gap:"6px",background:"none",border:"1px solid var(--bdr)",borderRadius:"var(--rs)",padding:"7px 14px",color:"var(--txt2)",fontSize:"12px",fontWeight:600,cursor:"pointer",fontFamily:"inherit",marginBottom:"14px",transition:"border-color .15s,color .15s"}}>
        ← {result ? "入力をやり直す" : "前の画面に戻る"}
      </button>
    )}

    {/* ══════════════════════════════════════════════════════
        PHASE 0: 来院前情報
    ══════════════════════════════════════════════════════ */}
    {phase===0&&(
      <div className="card">
        <div className="slabel">Phase 1 / 来院前情報</div>

        {/* ── Hotline転用ボタン ── */}
        <HotlineImportPanel onApply={(d)=>{
          setCaseNo(d.caseNo || null);
          if (d.age) setAge(Number(d.age));
          if (d.sex) setSex(d.sex==="男"||d.sex==="男性"?"male":"female");
          if (d.premrs!=null) setPremrs(Number(d.premrs));
          if (d.ht!=null) setHtn(d.ht);
          if (d.dm!=null) setDm(d.dm);
          if (d.af!=null) setAfibHx(d.af);

          // ── 発症時刻計算 ──────────────────────────────────────────
          // 基準時刻：発症明確 → onsetTime、睡眠中/不明 → lastSeenNormal
          // 到着時刻：savedAt から arrivalMin 分後（Hotlineに保存されていない場合はsavedAt）
          const isClear = d.onsetType === 'clear';
          const baseTimeStr = isClear ? d.onsetTime : d.lastSeenNormal;
          const savedAt = d.savedAt ? new Date(d.savedAt) : new Date();

          if (baseTimeStr) {
            const baseTime = new Date(baseTimeStr);
            const arrivalMin = d.arrivalMin ? Number(d.arrivalMin) : 0;
            const arrivalTime = new Date(savedAt.getTime() + arrivalMin * 60000);
            const elapsedH = (arrivalTime - baseTime) / 3600000;

            if (elapsedH <= 4.5) {
              setOnset('lkw_early');
              setDiscoveryH(null);
            } else if (elapsedH <= 24) {
              setOnset('lkw_mid');
              if (isClear) {
                // 発症時刻明確
                setDiscoveryH('clear');
              } else {
                // 発症時刻不明 → 発見時刻〜到着時刻で4.5h以内か判定
                const foundTimeStr = d.foundTime;
                if (foundTimeStr) {
                  const foundTime = new Date(foundTimeStr);
                  const foundToArrivalH = (arrivalTime - foundTime) / 3600000;
                  setDiscoveryH(foundToArrivalH <= 4.5 ? 'unknown_within4.5' : 'unknown_beyond4.5');
                } else {
                  // 発見時刻なし → 保守的に4.5h超と判定
                  setDiscoveryH('unknown_beyond4.5');
                }
              }
            } else {
              setOnset('lkw_late');
              setDiscoveryH(null);
            }
          } else {
            // 時刻情報なし → 不明として設定
            setOnset('lkw_mid');
            setDiscoveryH(isClear ? 'clear' : 'unknown_within4.5');
          }
          // ────────────────────────────────────────────────────────────

          // 抗血小板薬
          if (d.antiplt?.length) setApMeds(d.antiplt.map(n=>MEDS_AP.find(m=>n.includes(m.name))?.id).filter(Boolean));
          // 抗凝固薬
          if (d.anticoag?.length) setAcMeds(d.anticoag.map(n=>MEDS_AC.find(m=>n.includes(m.name))?.id).filter(Boolean));
          // 血圧
          if (d.bpRightSys) setSbpR(Number(d.bpRightSys));
          if (d.bpRightDia) setDbpR(Number(d.bpRightDia));
          if (d.bpLeftSys) { setSbpL(Number(d.bpLeftSys)); setShowBpL(true); }
          if (d.bpLeftDia) setDbpL(Number(d.bpLeftDia));
          // 来院時AF
          if (d.lvo_irregular) setAfibVital(true);
          // JCS
          if (d.jcs) setJcs(Number(d.jcs));
          // 瞳孔
          if (d.pupilR) setPupilR(Number(d.pupilR));
          if (d.pupilL) setPupilL(Number(d.pupilL));
          if (d.lrR!=null) setPupilRreact(d.lrR);
          if (d.lrL!=null) setPupilLreact(d.lrL);
          // LVOスケール → 症状state
          if (d.lvo_facial) setFacialPalsy(d.lvo_facial==="右"?"right":"left");
          if (d.lvo_motorArm) setArmParesis(d.lvo_motorArm==="右"?"right":"left");
          if (d.lvo_aphasia) setAphasia(true);
          if (d.lvo_gaze) setGaze(d.lvo_gaze==="右"?"right":"left");
          if (d.lvo_neglect) setNeglect(d.lvo_neglect==="右"?"right":"left");
        }}/>


        <div className="sq">患者基本情報と発症時刻・内服薬を確認してください</div>
        <div className="shint">救急隊・家族からの情報をもとに入力します</div>

        {/* 基本情報 */}
        <div style={{marginBottom:"20px"}}>
          <div style={secHdStyle}>👤 患者基本情報</div>
          <div style={{display:"flex",flexDirection:"column",gap:"12px"}}>

            {/* 年齢 */}
            <div style={{display:"flex",alignItems:"center",gap:"14px"}}>
              <span style={{fontSize:"12px",color:"var(--txt2)",minWidth:"40px"}}>年齢</span>
              <Drum value={age} onChange={setAge} min={0} max={120} step={1} width={80}/>
              <span style={{fontSize:"13px",color:"var(--txt2)"}}>歳</span>
            </div>

            {/* 性別 */}
            <div>
              <div style={{fontSize:"12px",color:"var(--txt2)",marginBottom:"6px"}}>性別</div>
              <div style={{display:"flex",gap:"8px"}}>
                {[["👨 男性","male"],["👩 女性","female"]].map(([lbl,val])=>(
                  <button key={val} onClick={()=>setSex(v=>v===val?null:val)}
                    style={{flex:1,padding:"12px 8px",borderRadius:"var(--rs)",cursor:"pointer",fontFamily:"inherit",fontSize:"14px",fontWeight:sex===val?700:400,border:`2px solid ${sex===val?"var(--teal)":"var(--bdr)"}`,background:sex===val?"rgba(13,148,136,.15)":"var(--surf2)",color:sex===val?"var(--teal-lt)":"var(--txt2)",transition:"all .15s",position:"relative"}}>
                    {sex===val&&<span style={{position:"absolute",top:"4px",right:"6px",fontSize:"10px",color:"var(--teal-lt)"}}>✓</span>}
                    {lbl}
                  </button>
                ))}
              </div>
            </div>

            {/* 病前mRS */}
            <div>
              <div style={{fontSize:"12px",color:"var(--txt2)",marginBottom:"8px"}}>病前 modified Rankin Scale（mRS）</div>
              <div style={{display:"flex",flexDirection:"column",gap:"5px"}}>
                {[
                  [0,"全く症状なし","完全に通常通りの活動ができる"],
                  [1,"症状はあるが明らかな障害なし","すべての通常の業務や活動ができる"],
                  [2,"軽度の障害","発症前の活動は全てできないが、介助なしで自分の身の回りのことはできる"],
                  [3,"中等度の障害","何らかの介助は必要だが、介助なしで歩行できる"],
                  [4,"中等度〜重度の障害","介助なしでは歩行や身体的需要に応じることができない"],
                  [5,"重度の障害","寝たきり・失禁あり・常に介護と注意が必要"],
                ].map(([score,title,desc])=>(
                  <button key={score} onClick={()=>setPremrs(v=>v===score?null:score)}
                    style={{display:"flex",alignItems:"flex-start",gap:"10px",padding:"10px 12px",borderRadius:"var(--rs)",border:`2px solid ${premrs===score?"var(--teal)":"var(--bdr)"}`,background:premrs===score?"rgba(13,148,136,.12)":"var(--surf2)",cursor:"pointer",textAlign:"left",fontFamily:"inherit",width:"100%",transition:"all .15s"}}>
                    <span style={{fontFamily:"'Syne',sans-serif",fontSize:"22px",fontWeight:800,lineHeight:1,minWidth:"28px",color:premrs===score?"var(--teal-lt)":score<=1?"var(--green-lt)":score<=3?"var(--amber-lt)":"var(--red-lt)",marginTop:"1px"}}>{score}</span>
                    <span style={{flex:1}}>
                      <span style={{display:"block",fontSize:"13px",fontWeight:600,color:premrs===score?"var(--txt)":"var(--txt2)"}}>{title}</span>
                      <span style={{display:"block",fontSize:"11px",color:"var(--txt3)",marginTop:"2px",lineHeight:1.4}}>{desc}</span>
                    </span>
                    {premrs===score&&<span style={{fontSize:"14px",color:"var(--teal-lt)",flexShrink:0}}>✓</span>}
                  </button>
                ))}
                {/* 不明 */}
                <button onClick={()=>setPremrs(v=>v==="unknown"?null:"unknown")}
                  style={{display:"flex",alignItems:"center",gap:"10px",padding:"10px 12px",borderRadius:"var(--rs)",border:`2px solid ${premrs==="unknown"?"var(--blue)":"var(--bdr)"}`,background:premrs==="unknown"?"rgba(59,130,246,.1)":"var(--surf2)",cursor:"pointer",textAlign:"left",fontFamily:"inherit",width:"100%",transition:"all .15s"}}>
                  <span style={{fontFamily:"'Syne',sans-serif",fontSize:"22px",fontWeight:800,lineHeight:1,minWidth:"28px",color:premrs==="unknown"?"var(--blue-lt)":"var(--txt3)"}}>?</span>
                  <span style={{flex:1}}>
                    <span style={{display:"block",fontSize:"13px",fontWeight:600,color:premrs==="unknown"?"var(--txt)":"var(--txt2)"}}>不明</span>
                    <span style={{display:"block",fontSize:"11px",color:"var(--txt3)",marginTop:"2px"}}>病前の生活状況が確認できない場合</span>
                  </span>
                  {premrs==="unknown"&&<span style={{fontSize:"14px",color:"var(--blue-lt)",flexShrink:0}}>✓</span>}
                </button>
              </div>
              {premrs!==null&&premrs>=3&&<div style={{marginTop:"6px",padding:"7px 10px",borderRadius:"var(--rs)",background:"rgba(245,158,11,.07)",border:"1px solid rgba(245,158,11,.25)",fontSize:"12px",color:"var(--amber-lt)"}}>
                ⚠ 病前mRS {premrs}：機能的転帰の評価・治療適応の判断に考慮が必要
              </div>}
            </div>

            {/* 高血圧・糖尿病（ABC²Dスコア用） */}
            <div>
              <div style={{fontSize:"12px",color:"var(--txt2)",marginBottom:"6px"}}>
                既往歴
                <span style={{fontSize:"11px",color:"var(--txt3)",marginLeft:"8px"}}>ABC²Dスコア（ICAS-O予測）の算出に使用</span>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:"8px"}}>
                {[["高血圧（Hypertension）",htn,setHtn],["糖尿病（Diabetes mellitus）",dm,setDm],["心房細動（Atrial fibrillation）",afibHx,setAfibHx]].map(([lbl,val,setVal])=>(
                  <div key={lbl}>
                    <div style={{fontSize:"12px",color:"var(--txt2)",marginBottom:"4px"}}>{lbl}</div>
                    <div className="toggle-row">
                      {[["あり",true],["なし",false]].map(([tlbl,tval])=>(
                        <button key={String(tval)} className="toggle-btn"
                          onClick={()=>setVal(v=>v===tval?null:tval)}
                          style={{border:`2px solid ${val===tval?(tval?"rgba(239,68,68,.5)":"rgba(34,197,94,.4)"):"var(--bdr)"}`,background:val===tval?(tval?"rgba(239,68,68,.08)":"rgba(34,197,94,.06)"):"var(--surf2)",color:val===tval?(tval?"var(--red-lt)":"var(--green-lt)"):"var(--txt2)",fontWeight:val===tval?700:400}}>
                          {tlbl}
                        </button>
                      ))}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </div>

        {/* Onset */}
        <div style={{marginBottom:"20px"}}>
          <div style={{fontSize:"12px",fontWeight:700,color:"var(--txt2)",textTransform:"uppercase",letterSpacing:".06em",marginBottom:"8px"}}>LKW（Last Known Well）からの経過時間</div>
          <div className="opts">
            {[
              ["lkw_early","LKW ≤4.5時間","発症時刻明確・IVT適応ウィンドウ内（rt-PA/TNK）"],
              ["lkw_mid","LKW 4.5〜24時間","延長ウィンドウ。発症時刻明確または不明（Wake-up含む）"],
              ["lkw_late","LKW 24時間超","標準再灌流療法の適応外。SKIP-EXTEND試験の適格性を確認"],
            ].map(([val,lbl,desc])=>(
              <button key={val} className="opt"
                onClick={()=>{setOnset(val); setDiscoveryH(null);}}
                style={onset===val?{borderColor:"var(--teal)",background:"rgba(13,148,136,.1)"}:{}}>
                <span className="opt-k" style={onset===val?{background:"var(--teal)",color:"#fff",borderColor:"var(--teal)"}:{}}>{onset===val?"✓":"○"}</span>
                <span style={{flex:1}}><span className="opt-t">{lbl}</span><span className="opt-d">{desc}</span></span>
              </button>
            ))}
          </div>

          {/* LKW 4.5〜24h：発症時刻明確か不明か */}
          {onset==="lkw_mid"&&(
            <div style={{marginTop:"12px",padding:"14px",borderRadius:"var(--rs)",border:"1px solid rgba(59,130,246,.3)",background:"rgba(59,130,246,.04)"}}>
              <div style={{fontSize:"12px",fontWeight:700,color:"var(--blue-lt)",marginBottom:"8px"}}>発症時刻の確認</div>
              <div className="opts" style={{gap:"7px"}}>
                <button className="opt" onClick={()=>setDiscoveryH("clear")}
                  style={discoveryH==="clear"?{borderColor:"var(--teal)",background:"rgba(13,148,136,.1)"}:{}}>
                  <span className="opt-k" style={discoveryH==="clear"?{background:"var(--teal)",color:"#fff",borderColor:"var(--teal)"}:{}}>A</span>
                  <span style={{flex:1}}>
                    <span className="opt-t">発症時刻明確</span>
                    <span className="opt-d">目撃者あり・症状出現時刻が特定できている</span>
                  </span>
                </button>
                <button className="opt" onClick={()=>setDiscoveryH(v=>v==="clear"||v===null?"unknown_within4.5":v)}
                  style={{borderColor:"rgba(124,58,237,.3)"}}>
                  <span className="opt-k" style={{background:"rgba(124,58,237,.08)",color:"var(--purple-lt)",borderColor:"rgba(124,58,237,.3)"}}>B</span>
                  <span style={{flex:1}}>
                    <span className="opt-t">発症時刻不明（Wake-up・目撃者なし）</span>
                    <span className="opt-d">発見時刻からの経過時間を追加入力 ↓</span>
                  </span>
                </button>
              </div>

              {/* 発症不明：発見からの経過時間 */}
              {(discoveryH==="unknown_within4.5"||discoveryH==="unknown_beyond4.5")&&(
                <div style={{marginTop:"10px",padding:"12px 14px",borderRadius:"var(--rs)",border:"1px solid rgba(124,58,237,.35)",background:"rgba(124,58,237,.05)"}}>
                  <div style={{fontSize:"12px",fontWeight:700,color:"var(--purple-lt)",marginBottom:"8px"}}>
                    発見（気づいた）時刻からの経過時間
                    <span style={{fontSize:"11px",fontWeight:400,color:"var(--txt3)",marginLeft:"8px"}}>IVTの適応判断に必要</span>
                  </div>
                  <div style={{display:"flex",gap:"8px"}}>
                    {[["within4.5","発見から4.5時間以内"],["beyond4.5","発見から4.5時間超"]].map(([val,lbl])=>(
                      <button key={val} onClick={()=>setDiscoveryH(`unknown_${val}`)}
                        style={{flex:1,padding:"10px 8px",borderRadius:"var(--rs)",cursor:"pointer",fontFamily:"inherit",fontSize:"13px",fontWeight:discoveryH===`unknown_${val}`?700:400,border:`2px solid ${discoveryH===`unknown_${val}`?(val==="within4.5"?"var(--teal)":"rgba(239,68,68,.6)"):"var(--bdr)"}`,background:discoveryH===`unknown_${val}`?(val==="within4.5"?"rgba(13,148,136,.1)":"rgba(239,68,68,.08)"):"var(--surf2)",color:discoveryH===`unknown_${val}`?(val==="within4.5"?"var(--teal-lt)":"var(--red-lt)"):"var(--txt2)",transition:"all .15s"}}>
                        {lbl}
                      </button>
                    ))}
                  </div>
                  {discoveryH==="unknown_beyond4.5"&&<div style={{marginTop:"8px",padding:"7px 10px",borderRadius:"var(--rs)",background:"rgba(239,68,68,.07)",border:"1px solid rgba(239,68,68,.25)",fontSize:"12px",color:"var(--red-lt)"}}>
                    ⛔ 発見から4.5h超：IVT適応なし（DWI-FLAIR mismatchによる検討余地もない）。EVT評価（DAWN/DEFUSE 3）のみ
                  </div>}
                  {discoveryH==="unknown_within4.5"&&<div style={{marginTop:"8px",padding:"8px 11px",borderRadius:"var(--rs)",background:"rgba(13,148,136,.06)",border:"1px solid rgba(13,148,136,.25)",fontSize:"12px",color:"var(--teal-lt)",lineHeight:1.65}}>
                    ✅ 発見から4.5h以内：<br/>
                    • <strong>LVO高疑い（NIHSS≥6等）</strong> → CT優先。CTAでMeVO/末梢・閉塞なし → MRIへ移行してDWI-FLAIR mismatch確認<br/>
                    • <strong>LVO疑いなし・軽症</strong> → MRI優先（DWI-FLAIR mismatch評価）
                  </div>}
                </div>
              )}

              {/* 不明ボタン押下で発見時刻入力を展開 */}
              {discoveryH==="clear"&&<div style={{marginTop:"8px",padding:"7px 10px",borderRadius:"var(--rs)",background:"rgba(13,148,136,.06)",border:"1px solid rgba(13,148,136,.25)",fontSize:"12px",color:"var(--teal-lt)"}}>
                ✅ 発症時刻明確（4.5〜24h）：延長ウィンドウ評価（DAWN/DEFUSE 3基準）
              </div>}
            </div>
          )}
        </div>


        {/* Antithrombotic meds */}
        <div style={{marginBottom:"20px"}}>
          <div style={{fontSize:"12px",fontWeight:700,color:"var(--txt2)",textTransform:"uppercase",letterSpacing:".06em",marginBottom:"8px"}}>抗凝固薬（内服中のものをすべて選択）</div>
          <div className="med-grid">
            {MEDS_AC.map(m=>(
              <div key={m.id} className={`med-item${acMeds.includes(m.id)?" sel":""}`} onClick={()=>setAcMeds(a=>a.includes(m.id)?a.filter(x=>x!==m.id):[...a,m.id])}>
                <div className="med-name">{m.name}</div>
                <div className="med-class"><span className={`dtag ${m.clsTag}`}>{m.cls}</span></div>
              </div>
            ))}
          </div>
          {acMeds.length>0&&(
            <div style={{marginTop:"10px"}}>
              <div style={{fontSize:"12px",color:"var(--txt2)",marginBottom:"5px"}}>最終投与時刻（わかる場合）</div>
              <input type="text" placeholder="例：8時間前、昨夜21時" value={lastAcTime} onChange={e=>setLastAcTime(e.target.value)}
                style={{background:"var(--surf2)",border:"1px solid var(--bdr)",borderRadius:"var(--rs)",padding:"8px 12px",color:"var(--txt)",fontFamily:"inherit",fontSize:"13px",width:"100%",outline:"none"}}/>
            </div>
          )}
        </div>

        <div style={{marginBottom:"20px"}}>
          <div style={{fontSize:"12px",fontWeight:700,color:"var(--txt2)",textTransform:"uppercase",letterSpacing:".06em",marginBottom:"8px"}}>抗血小板薬（内服中のものをすべて選択）</div>
          <div className="med-grid">
            {MEDS_AP.map(m=>(
              <div key={m.id} className={`med-item${apMeds.includes(m.id)?" sel":""}`} onClick={()=>setApMeds(a=>a.includes(m.id)?a.filter(x=>x!==m.id):[...a,m.id])}>
                <div className="med-name">{m.name}</div>
                <div className="med-class" style={{fontSize:"11px",color:"var(--txt3)"}}>{m.cls}</div>
              </div>
            ))}
          </div>
        </div>

        <button className="btn btn-p" disabled={!onset} onClick={finishPrehospital}
          style={{opacity:onset?1:0.4}}>
          救急外来評価へ →
        </button>
      </div>
    )}


    {/* ══════════════════════════════════════════════════════
        PHASE 1: 救急外来所見
    ══════════════════════════════════════════════════════ */}
    {phase===1&&(
      <div className="card">
        <div className="slabel">Phase 2 / 救急外来所見</div>
        <div className="sq">バイタル・各種検査・神経学的所見を入力してください</div>
        <div className="shint">来院時に評価した所見を順番に入力します</div>

        {/* ─── 2-1. バイタルサイン ─── */}
        <div style={{marginBottom:"20px"}}>
          <div style={secHdStyle}>🩺 バイタルサイン</div>
          <div style={{display:"flex",flexDirection:"column",gap:"14px"}}>

            {/* 血圧（右上肢） */}
            <div>
              <div style={{fontSize:"12px",color:"var(--txt2)",marginBottom:"6px"}}>右上肢血圧</div>
              <div style={{display:"flex",alignItems:"center",gap:"10px",flexWrap:"wrap"}}>
                <div style={{display:"flex",alignItems:"center",gap:"6px"}}>
                  <Drum value={sbpR} onChange={setSbpR} min={60} max={250} step={5} width={80}/>
                  <span style={{fontSize:"18px",color:"var(--txt3)"}}>/</span>
                  <Drum value={dbpR} onChange={setDbpR} min={30} max={150} step={5} width={80}/>
                </div>
                <span style={{fontSize:"12px",color:"var(--txt3)"}}>mmHg</span>
                {sbpR<110&&<span style={posBadgeStyle}>⚠ SBP&lt;110</span>}
              </div>
            </div>

            {/* 左上肢血圧（任意） */}
            {!showBpL
              ? <button onClick={()=>setShowBpL(true)} style={{alignSelf:"flex-start",background:"none",border:"1px dashed var(--bdr)",borderRadius:"var(--rs)",padding:"5px 12px",color:"var(--txt3)",fontSize:"12px",cursor:"pointer"}}>
                  + 左上肢血圧を追加（左右差評価）
                </button>
              : <div>
                  <div style={{fontSize:"12px",color:"var(--txt2)",marginBottom:"6px"}}>左上肢血圧</div>
                  <div style={{display:"flex",alignItems:"center",gap:"10px",flexWrap:"wrap"}}>
                    <div style={{display:"flex",alignItems:"center",gap:"6px"}}>
                      <Drum value={sbpL} onChange={setSbpL} min={60} max={250} step={5} width={80}/>
                      <span style={{fontSize:"18px",color:"var(--txt3)"}}>/</span>
                      <Drum value={dbpL} onChange={setDbpL} min={30} max={150} step={5} width={80}/>
                    </div>
                    <span style={{fontSize:"12px",color:"var(--txt3)"}}>mmHg</span>
                  </div>
                  {sbpDiff>0&&<div style={{marginTop:"6px",fontSize:"12px",padding:"6px 10px",borderRadius:"var(--rs)",background:"var(--surf2)",border:`1px solid ${sbpDiff>=20?"rgba(239,68,68,.4)":"var(--bdr)"}`,color:sbpDiff>=20?"var(--red-lt)":"var(--txt2)"}}>
                    収縮期差：<strong style={{color:sbpDiff>=20?"var(--red-lt)":"var(--txt)"}}>{sbpDiff} mmHg</strong>{sbpDiff>=20&&" ⚠ ≥20（解離陽性基準）"}
                  </div>}
                </div>
            }

            {/* 脈拍 + 心房細動 */}

            {/* 瞳孔 */}

                {[["右瞳孔","R",pupilR,setPupilR,pupilRreact,setPupilRreact],["左瞳孔","L",pupilL,setPupilL,pupilLreact,setPupilLreact]].map(([title,side,val,setVal,react,setReact])=>{

                </div>

            </div>
          </div>
        </div>


        {/* ─── 2-2. 神経学的評価（症状 → NIHSS）─── */}
        <div style={{marginBottom:"20px"}}>

              </button>

              {/* 顔面麻痺：サイクル */}
              {(()=>{
                const cycle=[null,"right","left"];

                    <span style={{fontSize:"15px"}}>😮</span>
                    <span style={{flex:1,textAlign:"left"}}><span style={{fontWeight:600}}>{label}</span><span style={{fontSize:"11px",color:"var(--txt3)",marginLeft:"8px"}}>タップで切替→</span></span>
                    {facialPalsy&&<span style={{fontSize:"10px",padding:"2px 6px",borderRadius:"3px",background:"rgba(245,158,11,.12)",color:"var(--amber-lt)",fontWeight:700}}>LVOスコア</span>}
                  </button>
                );
              })()}

              {/* 上肢麻痺：サイクル */}
              {(()=>{
                const cycle=[null,"right","left"];

                return(
                  <button onClick={()=>setArmParesis(cycle[(idx+1)%cycle.length])}
                    style={{...sympBtnStyle(!!armParesis,false),borderColor:armParesis?"rgba(239,68,68,.4)":"var(--bdr)",color:armParesis?"var(--red-lt)":"var(--txt3)"}}>
                    <span style={{fontSize:"15px"}}>💪</span>
                    <span style={{flex:1,textAlign:"left"}}><span style={{fontWeight:600}}>{label}</span><span style={{fontSize:"11px",color:"var(--txt3)",marginLeft:"8px"}}>タップで切替→</span></span>
                    {armParesis&&<span style={{fontSize:"10px",padding:"2px 6px",borderRadius:"3px",background:"rgba(239,68,68,.12)",color:"var(--red-lt)",fontWeight:700}}>LVOスコア</span>}
                  </button>
                );
              })()}

              {/* 下肢麻痺：サイクル */}
              {(()=>{
                const cycle=[null,"right","left"];
                const idx=cycle.indexOf(legParesis);

                  <button onClick={()=>setLegParesis(cycle[(idx+1)%cycle.length])}

                    <span style={{flex:1,textAlign:"left"}}><span style={{fontWeight:600}}>{label}</span><span style={{fontSize:"11px",color:"var(--txt3)",marginLeft:"8px"}}>タップで切替→</span></span>

              {/* 共同偏視：サイクル */}

                    <span style={{fontSize:"15px"}}>👁</span>
                    <span style={{flex:1,textAlign:"left"}}><span style={{fontWeight:600}}>{label}</span>{gaze&&<span style={{fontSize:"11px",color:"var(--red-lt)",fontWeight:700,marginLeft:"8px"}}>皮質症状</span>}<span style={{fontSize:"11px",color:"var(--txt3)",marginLeft:"8px"}}>タップで切替→</span></span>
                    {gaze&&<span style={{fontSize:"10px",padding:"2px 6px",borderRadius:"3px",background:"rgba(239,68,68,.12)",color:"var(--red-lt)",fontWeight:700}}>LVOスコア</span>}

          <div style={{marginTop:"16px"}}>
            <ScoreSlider label="NIHSS" value={nihss} min={0} max={42} onChange={setNihss} color={ni.c}

              crits={[
                {label:"NIHSS ≥6：LVO疑い・EVT一般基準",met:nihss>=6,cls:nihss>=6?"met":"unmet"},
                {label:"NIHSS ≥8：RESCUE-M2O基準",met:nihss>=8,cls:nihss>=8?"met":"warn"},
                {label:"NIHSS ≥10：DAWN基準（9–24h LVO）",met:nihss>=10,cls:nihss>=10?"met":"warn"},
              ]}
            />
          </div>

          {/* LVOスケール（日本脳卒中学会推奨）*/}
          <div style={{marginTop:"14px",padding:"14px 15px",borderRadius:"var(--rs)",background:lvoScalePos?"rgba(239,68,68,.07)":"rgba(13,148,136,.05)",border:`1px solid ${lvoScalePos?"rgba(239,68,68,.35)":"rgba(13,148,136,.25)"}`}}>

              </div>
              <div style={{fontFamily:"'Syne',sans-serif",fontSize:"32px",fontWeight:800,color:lvoScalePos?"var(--red-lt)":"var(--green-lt)",lineHeight:1}}>

            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"4px",marginBottom:"10px",fontSize:"11px"}}>

              ].map(([label,pts,val],i)=>(

                  <span style={{color:pts?"var(--txt)":"var(--txt3)"}}>{label}</span>

                </div>
              ))}
            </div>
            <div style={{fontSize:"12px",fontWeight:700,color:lvoScalePos?"var(--red-lt)":"var(--green-lt)"}}>
              {lvoScalePos

                : lvoScaleTotal>=2
                  ? `⚠ ${lvoScaleTotal}項目陽性 → LVOの可能性あり（感度88%・特異度51%）`
                  : `✅ ${lvoScaleTotal}項目陽性（<3）→ LVOの可能性は比較的低い`}
            </div>
            {lvoScalePos&&<div style={{marginTop:"7px",fontSize:"11px",color:"var(--txt3)",lineHeight:1.5}}>
              参考：3項目以上 感度77.3%・特異度73.8%・陽性適中率45.6%・陰性適中率92.0%（消防庁 令和4年度）
            </div>}
          </div>

          {/* LVO疑いアラート */}
          {lvoSuspect&&<div style={{marginTop:"6px",padding:"7px 10px",borderRadius:"var(--rs)",background:"rgba(239,68,68,.07)",border:"1px solid rgba(239,68,68,.3)",fontSize:"12px",color:"var(--red-lt)"}}>
            ⚠ 頸部エコーでLVO疑い（CCA EDV比≥1.4）。CTAで脳主幹動脈閉塞を確認してください
          </div>}
          {posteriorSymp&&<div style={{marginTop:"6px",padding:"7px 10px",borderRadius:"var(--rs)",background:"rgba(59,130,246,.07)",border:"1px solid rgba(59,130,246,.25)",fontSize:"12px",color:"var(--blue-lt)"}}>
            💡 後方循環症状あり → CTよりMRI DWIが有用。椎骨動脈EDVを確認してください
          </div>}
        </div>

        {/* ─── 2-3. 頸部エコー ─── */}
        <div style={{marginBottom:"20px"}}>
          <div style={secHdStyle}>🔊 頸部エコー</div>

          {/* 病側CCA */}
          <div style={{marginBottom:"12px"}}>
            <div style={{fontSize:"12px",color:cca_sick_side?"var(--red-lt)":"var(--txt2)",fontWeight:700,marginBottom:"8px"}}>
              {cca_sick_side ? `${cca_sick_label}（症状から自動判定）` : "病側総頸動脈（症状選択後に自動判定）"}
            </div>
            <div style={{background:"var(--surf2)",border:`1px solid ${cca_sick_side?"rgba(239,68,68,.35)":"var(--bdr)"}`,borderRadius:"var(--rs)",padding:"12px 14px",display:"flex",flexDirection:"column",gap:"10px"}}>

              {/* Flap */}
              <div>
                <div style={{fontSize:"11px",color:"var(--txt3)",marginBottom:"4px"}}>Intimal flap</div>
                <div className="toggle-row">
                  {[["あり",true],["なし",false],["未施行",null]].map(([lbl,val])=>(
                    <button key={String(val)} className="toggle-btn" onClick={()=>setNecSick_flap(v=>v===val?null:val)}
                      style={toggleStyle(necSick_flap,val,val===true?"rgba(239,68,68,.5)":"rgba(34,197,94,.4)")}>{lbl}</button>
                  ))}
                </div>
              </div>

              {/* 閉塞の有無 */}
              <div>
                <div style={{fontSize:"11px",color:"var(--txt3)",marginBottom:"4px"}}>閉塞</div>
                <div className="toggle-row" style={{marginBottom:"6px"}}>
                  {[["閉塞あり",true],["閉塞なし",false]].map(([lbl,val])=>(
                    <button key={String(val)} className="toggle-btn" onClick={()=>setNecSick_occl(v=>v===val?null:val)}
                      style={toggleStyle(necSick_occl,val,val===true?"rgba(239,68,68,.5)":"rgba(34,197,94,.4)")}>{lbl}</button>
                  ))}
                </div>
                {necSick_occl===true&&(
                  <div style={{display:"flex",flexDirection:"column",gap:"6px",padding:"10px 12px",borderRadius:"var(--rs)",background:"rgba(239,68,68,.05)",border:"1px solid rgba(239,68,68,.2)"}}>
                    <div>
                      <div style={{fontSize:"11px",color:"var(--txt3)",marginBottom:"4px"}}>閉塞部位</div>
                      <div style={{display:"flex",gap:"6px"}}>
                        {[["CCA（総頸動脈）","CCA"],["ICA起始部","ICA"]].map(([lbl,val])=>(
                          <button key={val} onClick={()=>setNecSick_occlSite(v=>v===val?null:val)}
                            style={{flex:1,padding:"7px 8px",borderRadius:"var(--rs)",border:`1px solid ${necSick_occlSite===val?"rgba(239,68,68,.5)":"var(--bdr)"}`,background:necSick_occlSite===val?"rgba(239,68,68,.1)":"transparent",color:necSick_occlSite===val?"var(--red-lt)":"var(--txt2)",cursor:"pointer",fontSize:"12px",fontWeight:600,fontFamily:"inherit"}}>
                            {lbl}
                          </button>
                        ))}
                      </div>
                    </div>
                    <div>
                      <div style={{fontSize:"11px",color:"var(--txt3)",marginBottom:"4px"}}>性状（複数可）</div>
                      <div style={{display:"flex",gap:"6px"}}>
                        {[["動脈硬化","atheroma"],["血栓","thrombus"]].map(([lbl,val])=>(
                          <button key={val} onClick={()=>setNecSick_occlType(a=>a.includes(val)?a.filter(x=>x!==val):[...a,val])}
                            style={{flex:1,padding:"7px 8px",borderRadius:"var(--rs)",border:`1px solid ${necSick_occlType.includes(val)?"rgba(245,158,11,.5)":"var(--bdr)"}`,background:necSick_occlType.includes(val)?"rgba(245,158,11,.1)":"transparent",color:necSick_occlType.includes(val)?"var(--amber-lt)":"var(--txt2)",cursor:"pointer",fontSize:"12px",fontWeight:600,fontFamily:"inherit"}}>
                            {lbl}
                          </button>
                        ))}
                      </div>
                    </div>
                  </div>
                )}
              </div>

              {/* その他所見（複数可） */}
              <div>
                <div style={{fontSize:"11px",color:"var(--txt3)",marginBottom:"4px"}}>その他所見（複数可）</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"5px"}}>
                  {[["狭窄","stenosis"],["可動性プラーク","plaque"],["血栓様構造物","thrombus_like"],["Web","web"]].map(([lbl,val])=>(
                    <button key={val} onClick={()=>setNecSick_findings(a=>a.includes(val)?a.filter(x=>x!==val):[...a,val])}
                      style={{padding:"7px 8px",borderRadius:"var(--rs)",border:`1px solid ${necSick_findings.includes(val)?"rgba(59,130,246,.5)":"var(--bdr)"}`,background:necSick_findings.includes(val)?"rgba(59,130,246,.1)":"transparent",color:necSick_findings.includes(val)?"var(--blue-lt)":"var(--txt2)",cursor:"pointer",fontSize:"12px",fontWeight:600,fontFamily:"inherit",textAlign:"center"}}>
                      {lbl}
                    </button>
                  ))}
                </div>
              </div>

              {/* 拡張期血流（病側） */}
              <div>
                <div style={{fontSize:"11px",color:"var(--txt3)",marginBottom:"4px"}}>拡張期血流速度（EDV）</div>
                <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
                  <input type="number" min="0" max="200" value={necSick_edv} onChange={e=>setNecSick_edv(e.target.value)} placeholder="---"
                    style={{width:"72px",background:"var(--bg)",border:"1px solid var(--bdr)",borderRadius:"5px",padding:"6px 8px",color:"var(--txt)",fontSize:"14px",fontWeight:700,textAlign:"center",fontFamily:"inherit",outline:"none"}}/>
                  <span style={{fontSize:"12px",color:"var(--txt3)"}}>cm/s</span>
                </div>
              </div>
            </div>
          </div>

          {/* 健側CCA（flapとEDVのみ） */}
          <div style={{marginBottom:"12px"}}>
            <div style={{fontSize:"12px",color:cca_sick_side?"var(--green-lt)":"var(--txt2)",fontWeight:700,marginBottom:"8px"}}>
              {cca_sick_side ? cca_well_label : "健側総頸動脈（症状選択後に自動判定）"}
            </div>
            <div style={{background:"var(--surf2)",border:`1px solid ${cca_sick_side?"rgba(34,197,94,.25)":"var(--bdr)"}`,borderRadius:"var(--rs)",padding:"12px 14px",display:"flex",flexDirection:"column",gap:"10px"}}>
              <div>
                <div style={{fontSize:"11px",color:"var(--txt3)",marginBottom:"4px"}}>Intimal flap</div>
                <div className="toggle-row">
                  {[["あり",true],["なし",false],["未施行",null]].map(([lbl,val])=>(
                    <button key={String(val)} className="toggle-btn" onClick={()=>setNecWell_flap(v=>v===val?null:val)}
                      style={toggleStyle(necWell_flap,val,val===true?"rgba(239,68,68,.5)":"rgba(34,197,94,.4)")}>{lbl}</button>
                  ))}
                </div>
              </div>
              <div>
                <div style={{fontSize:"11px",color:"var(--txt3)",marginBottom:"4px"}}>拡張期血流速度（EDV）</div>
                <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
                  <input type="number" min="0" max="200" value={necWell_edv} onChange={e=>setNecWell_edv(e.target.value)} placeholder="---"
                    style={{width:"72px",background:"var(--bg)",border:"1px solid var(--bdr)",borderRadius:"5px",padding:"6px 8px",color:"var(--txt)",fontSize:"14px",fontWeight:700,textAlign:"center",fontFamily:"inherit",outline:"none"}}/>
                  <span style={{fontSize:"12px",color:"var(--txt3)"}}>cm/s</span>
                </div>
              </div>
            </div>
          </div>

          {/* EDV比判定 */}
          {edvRatio!==null&&(
            <div style={{padding:"8px 12px",borderRadius:"var(--rs)",background:lvoSuspect?"rgba(239,68,68,.08)":"rgba(34,197,94,.06)",border:`1px solid ${lvoSuspect?"rgba(239,68,68,.35)":"rgba(34,197,94,.3)"}`,fontSize:"12px",color:lvoSuspect?"var(--red-lt)":"var(--green-lt)",marginBottom:"10px"}}>
              {lvoSuspect?"🚨":"✅"} 健側/病側 EDV比 = <strong>{edvRatio.toFixed(2)}</strong>
              {lvoSuspect?" (≥1.4) → 病側の拡張期血流低下 → 脳主幹動脈閉塞を疑う":" (<1.4) → 有意な左右差なし"}
            </div>
          )}

          {/* 椎骨動脈（任意追加） */}
          {!showVA
            ? <button onClick={()=>setShowVA(true)} style={{background:"none",border:"1px dashed var(--bdr)",borderRadius:"var(--rs)",padding:"6px 14px",color:"var(--txt3)",fontSize:"12px",cursor:"pointer"}}>
                + 椎骨動脈を追加評価する
              </button>
            : <div>
                <div style={{fontSize:"12px",fontWeight:700,color:"var(--blue-lt)",marginBottom:"6px"}}>椎骨動脈（VA）拡張期血流速度</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px"}}>
                  {[["右VA",vaR_edv,setVaR_edv],["左VA",vaL_edv,setVaL_edv]].map(([lbl,edv,setEdv])=>(
                    <div key={lbl} style={{background:"var(--surf2)",border:"1px solid rgba(59,130,246,.25)",borderRadius:"var(--rs)",padding:"10px 12px"}}>
                      <div style={{fontSize:"11px",color:"var(--blue-lt)",fontWeight:700,marginBottom:"6px"}}>{lbl}</div>
                      <div style={{display:"flex",alignItems:"center",gap:"6px"}}>
                        <input type="number" min="0" max="150" value={edv} onChange={e=>setEdv(e.target.value)} placeholder="---"
                          style={{width:"64px",background:"var(--bg)",border:"1px solid var(--bdr)",borderRadius:"5px",padding:"5px 6px",color:"var(--txt)",fontSize:"14px",fontWeight:700,textAlign:"center",fontFamily:"inherit",outline:"none"}}/>
                        <span style={{fontSize:"11px",color:"var(--txt3)"}}>cm/s</span>
                      </div>
                    </div>
                  ))}
                </div>
                {(vaREdv>0&&vaREdv<10||vaLEdv>0&&vaLEdv<10)&&(
                  <div style={{marginTop:"6px",padding:"7px 10px",borderRadius:"var(--rs)",background:"rgba(239,68,68,.07)",border:"1px solid rgba(239,68,68,.3)",fontSize:"12px",color:"var(--red-lt)"}}>
                    ⚠ 椎骨動脈 EDV 低下 → 後方循環LVO（脳底動脈閉塞）を疑う。緊急CTAで椎骨脳底動脈を確認
                  </div>
                )}
              </div>
          }
        </div>

        {/* ─── 2-4. 12誘導心電図 ─── */}
        <div style={{marginBottom:"20px"}}>
          <div style={secHdStyle}>📈 12誘導心電図</div>
          <div>
            <div style={{fontSize:"12px",color:"var(--txt2)",marginBottom:"5px"}}>ST変化</div>
            <div className="toggle-row">
              {[["ST変化あり",true],["ST変化なし",false],["未施行/不明",null]].map(([lbl,val])=>(
                <button key={String(val)} className="toggle-btn" onClick={()=>setStChange(v=>v===val?null:val)}
                  style={toggleStyle(stChange,val,val===true?"rgba(239,68,68,.5)":"rgba(34,197,94,.4)")}>
                  {lbl}
                </button>
              ))}
            </div>
            {stChange===true&&(
              <div style={{...posBannerStyle,marginTop:"6px"}}>
                <div style={{fontWeight:700,marginBottom:"4px"}}>⚠ ST変化あり → ACSを疑う場合</div>
                <div style={{fontSize:"11px",lineHeight:1.6}}>
                  🚨 <strong>CCUコール</strong>を検討<br/>
                  🧪 <strong>トロポニンT（高感度）</strong>を採血・提出<br/>
                  脳卒中との合併（脳心同時発症）や脳卒中後心筋障害（Takotsubo）も考慮
                </div>
              </div>
            )}
          </div>
        </div>

        {/* ─── 2-5. 胸部レントゲン ─── */}
        <div style={{marginBottom:"20px"}}>
          <div style={secHdStyle}>📷 胸部レントゲン</div>
          <div style={{fontSize:"12px",color:"var(--txt2)",marginBottom:"5px"}}>縦隔拡大</div>
          <div className="toggle-row">
            {[["縦隔拡大あり（陽性）",true],["縦隔拡大なし",false],["未施行/不明",null]].map(([lbl,val])=>(
              <button key={String(val)} className="toggle-btn" onClick={()=>setMediastinum(val)}
                style={toggleStyle(mediastinum,val,val===true?"rgba(239,68,68,.5)":"rgba(34,197,94,.4)")}>
                {lbl}
              </button>
            ))}
          </div>
          {mediastinum===true&&<div style={{...posBannerStyle,marginTop:"6px"}}>⚠ 縦隔拡大あり → 大動脈解離陽性基準</div>}
        </div>

        {/* ─── 大動脈解離スクリーニング 総合判定 ─── */}
        <div style={{marginBottom:"20px",padding:"12px 14px",borderRadius:"var(--rs)",border:`1px solid ${aoPos?"rgba(239,68,68,.4)":"rgba(34,197,94,.3)"}`,background:aoPos?"rgba(239,68,68,.06)":"rgba(34,197,94,.05)"}}>
          <div style={{fontSize:"11px",fontWeight:700,textTransform:"uppercase",letterSpacing:".07em",color:aoPos?"var(--red-lt)":"var(--green-lt)",marginBottom:"6px"}}>大動脈解離スクリーニング 総合判定</div>
          <div style={{display:"flex",flexDirection:"column",gap:"4px",marginBottom:"8px"}}>
            {[
              {lbl:"右上肢 SBP <110 mmHg",pos:sbpR<110,val:`${sbpR}/${dbpR} mmHg`},
              {lbl:"血圧左右差 ≥20 mmHg",pos:showBpL&&sbpDiff>=20,val:showBpL?`収差${sbpDiff} mmHg`:"未測定",skip:!showBpL},
              {lbl:"頸部エコー flap（病側）",pos:necSick_flap===true,val:necSick_flap===true?"あり":necSick_flap===false?"なし":"未施行"},
              {lbl:"胸部XP 縦隔拡大",pos:mediastinum===true,val:mediastinum===true?"あり":mediastinum===false?"なし":"未施行"},
            ].map((r,i)=>(
              <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",fontSize:"12px",padding:"4px 0",borderBottom:"1px solid rgba(255,255,255,.05)"}}>
                <span style={{color:r.pos?"var(--red-lt)":r.skip?"var(--txt3)":"var(--txt2)"}}>{r.pos?"⚠ ":r.skip?"— ":"✓ "}{r.lbl}</span>
                <span style={{color:r.pos?"var(--red-lt)":"var(--txt3)",fontWeight:r.pos?700:400}}>{r.val}</span>
              </div>
            ))}
          </div>
          <div style={{fontSize:"13px",fontWeight:700,color:aoPos?"var(--red-lt)":"var(--green-lt)"}}>
            {aoPos?"🚨 大動脈解離を疑う → CT（頭部+CTAP+胸腹部CTA）プロトコールへ":"✅ 陽性基準なし → 通常の脳卒中フローへ"}
          </div>
        </div>

        <button className="btn btn-p" onClick={finishED}>
          {aoPos ? "🚨 大動脈解離プロトコールへ →" : herniationSign ? "🚨 脳ヘルニア → CT緊急評価へ →" : "画像診断へ →"}
        </button>
      </div>
    )}

    {/* ══════════════════════════════════════════════════════
        PHASE 2: 画像診断
    ══════════════════════════════════════════════════════ */}
    {phase===2&&(
      <>
        {/* ══ 大動脈解離プロトコル ══ */}

        {/* Step: CT（胸腹部CTA）施行の説明 → CTA結果入力 */}
        {imgSubStep==="aorta_cta"&&(
          <>
            {/* 画像プロトコル提示 */}
            <div className="irec" style={{marginBottom:"12px"}}>
              <div className="irec-title">
                <span className="irec-badge" style={{background:"var(--red)"}}>大動脈解離疑い</span>
                緊急CT（頭部 + CTAP + 胸腹部CTA）
              </div>
              <div className="irec-rat">大動脈解離スクリーニング陽性。以下のプロトコールで緊急CTを施行してください。</div>
              <div className="isteps">
                <div className="istep"><span className="istep-lbl lbl-1">1st</span><span className="istep-txt"><strong>NCCT（頭部）</strong>― 出血性脳卒中の除外（造影前）</span></div>
                <div className="istep"><span className="istep-lbl lbl-1">1st</span><span className="istep-txt"><strong>造影CT 胸腹部CTA</strong>― 解離の範囲・Stanford A/B・真腔偽腔・心嚢液の確認</span></div>
                <div className="istep"><span className="istep-lbl lbl-1">1st</span><span className="istep-txt"><strong>CTAP（頭部〜骨盤）</strong>― 頸動脈・椎骨動脈への解離進展・臓器虚血の評価</span></div>
                <div className="istep alt"><span className="istep-lbl lbl-2">考慮</span><span className="istep-txt"><strong>心エコー（TTE/TEE）</strong>― 大動脈弁逆流・Stanford A型の術前評価</span></div>
              </div>
            </div>

            {/* CTA結果入力 */}
            <div className="card" style={{borderColor:"rgba(239,68,68,.4)"}}>
              <div className="slabel" style={{color:"var(--red-lt)"}}>Step / 胸腹部CTA 結果</div>
              <div className="sq">CTAで大動脈解離は確認されましたか？</div>
              <div className="shint">読影後に結果を選択してください</div>
              <div className="opts">
                <button className="opt" style={{borderColor:"rgba(239,68,68,.5)"}} onClick={()=>{
                  setAortaCtaResult("confirmed_A");
                  addHistory("aorta_cta","胸腹部CTA","Stanford A型大動脈解離確認");
                  pushNav(); setTimeout(()=>window.scrollTo({top:0,behavior:"smooth"}),50);
                  setResult(RESULTS.r_aorta); setPhase(3);
                }}>
                  <span className="opt-k" style={{background:"rgba(239,68,68,.12)",color:"var(--red-lt)",borderColor:"rgba(239,68,68,.3)"}}>A</span>
                  <span style={{flex:1}}>
                    <span className="opt-t">Stanford A型大動脈解離あり（上行大動脈含む）</span>
                    <span className="opt-d">🚨 心臓血管外科に緊急コール → 緊急手術を検討。IVT絶対禁忌</span>
                  </span>
                </button>
                <button className="opt" style={{borderColor:"rgba(34,197,94,.4)"}} onClick={()=>{
                  setAortaCtaResult("denied");
                  addHistory("aorta_cta","胸腹部CTA","Stanford A型大動脈解離否定 → 脳卒中プロトコルへ");
                  pushNav(); setTimeout(()=>window.scrollTo({top:0,behavior:"smooth"}),50);
                  setImgSubStep("image_result");
                  setImgChoice("1st");
                  addHistory("img_choice","実施画像","✓ CT（解離否定後）");
                }}>
                  <span className="opt-k" style={{background:"rgba(34,197,94,.08)",color:"var(--green-lt)",borderColor:"rgba(34,197,94,.3)"}}>B</span>
                  <span style={{flex:1}}>
                    <span className="opt-t">Stanford A型大動脈解離なし（解離否定 / Stanford Bのみ）</span>
                    <span className="opt-d">✅ 脳卒中プロトコルへ → NCCTの評価（出血除外・ASPECTS）に進む</span>
                  </span>
                </button>
              </div>
            </div>
          </>
        )}

        {/* MRI禁忌確認（MRI-firstのときのみ） */}
        {showMriChk&&(
          <div className="card" style={{borderColor:"rgba(124,58,237,.4)",background:"linear-gradient(135deg,rgba(124,58,237,.05),rgba(13,148,136,.03))"}}>
            <div className="slabel" style={{color:"var(--purple-lt)"}}>MRI禁忌確認</div>
            <div className="sq">MRI撮影に禁忌・重大な障壁はありますか？</div>
            <div className="shint">推奨プロトコールがMRI-firstのため確認が必要です</div>
            <div className="opts">
              <button className="opt" onClick={()=>handleMriChk(false)} style={{borderColor:"rgba(245,158,11,.4)"}}>
                <span className="opt-k">A</span>
                <span style={{flex:1}}><span className="opt-t">MRI禁忌あり</span><span className="opt-d">金属デバイス非対応・不穏等 → 2nd choice（CT）に切り替え</span></span>
              </button>
              <button className="opt" onClick={()=>handleMriChk(true)} style={{borderColor:"rgba(13,148,136,.4)"}}>
                <span className="opt-k">B</span>
                <span style={{flex:1}}><span className="opt-t">MRI禁忌なし（施行可能）</span><span className="opt-d">1st choice（MRI）のプロトコールを提示</span></span>
              </button>
            </div>
          </div>
        )}

        {/* Imaging recommendation */}
        {!showMriChk&&imagingRec&&!imgChoice&&(
          <>
            <div className="irec">
              <div className="irec-title"><span className="irec-badge">推奨画像プロトコール</span>{imagingRec.title}</div>
              {imagingRec.rationale&&<div className="irec-rat">{imagingRec.rationale}</div>}
              <div className="choice-lbl" style={{color:"var(--teal-lt)"}}>1st Choice</div>
              <div className="isteps">
                {imagingRec.steps.map((s,i)=>(
                  <div key={i} className="istep">
                    <span className="istep-lbl lbl-1">{s.label}</span>
                    <span className="istep-txt" dangerouslySetInnerHTML={{__html:s.text}}/>
                  </div>
                ))}
              </div>
